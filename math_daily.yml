name: 數學練習每日更新

on:
  schedule:
    - cron: '0 23 * * *'   # 台灣時間早上 07:00
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  math:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 執行數學題目生成
        run: python math_scraper.py
      - name: 推送更新
        run: |
          git config user.name "數學機器人"
          git config user.email "bot@bot.local"
          git add 數學練習.html math_history.json
          git diff --staged --quiet || git commit -m "🔢 $(date '+%Y/%m/%d') 數學練習更新"
          git push
