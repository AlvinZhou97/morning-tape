<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文學習日報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F3; --card:#FFFFFF; --ink:#1C1917; --muted:#78716C;
  --border:#E7E5E4; --accent:#4F46E5; --gold:#B45309;
  --green:#15803D; --red:#DC2626; --orange:#C2410C;
  --accent-light:#EEF2FF; --gold-light:#FFFBEB;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);
  font-family:"Noto Sans TC","Outfit",sans-serif;
  min-height:100vh;line-height:1.6;padding-bottom:90px}

/* ── 頁首 ───────────────────────────────────────────────── */
.header{background:#fff;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:30}
.header-inner{max-width:640px;margin:0 auto;padding:0 16px;
  display:flex;align-items:center;gap:12px;height:52px}
.logo{font-family:"Outfit";font-weight:800;font-size:17px;
  letter-spacing:-.02em;color:var(--ink)}
.logo span{color:var(--accent)}
.hdate{margin-left:auto;font-family:"Outfit";font-size:12px;
  font-weight:600;color:var(--muted);letter-spacing:.04em}

/* ── 分頁 ───────────────────────────────────────────────── */
.tabs{background:#fff;border-bottom:2px solid var(--border);
  display:flex;max-width:640px;margin:0 auto;padding:0 16px;gap:0;position:sticky;top:52px;z-index:28}
.tab-btn{flex:1;background:none;border:none;cursor:pointer;
  font-family:inherit;font-size:14px;font-weight:700;color:var(--muted);
  padding:12px 0;position:relative;transition:color .2s}
.tab-btn.on{color:var(--accent)}
.tab-btn.on::after{content:"";position:absolute;left:25%;right:25%;
  bottom:-2px;height:2.5px;background:var(--accent);border-radius:2px}
.tab-btn:hover:not(.on){color:var(--ink)}

/* ── 進度列 ────────────────────────────────────────────── */
.progress-wrap{background:#fff;border-bottom:1px solid var(--border);
  padding:8px 16px}
.progress-track{max-width:640px;margin:0 auto;
  display:flex;align-items:center;gap:10px}
.progress-bar-bg{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.progress-label{font-family:"Outfit";font-size:12px;font-weight:700;
  color:var(--muted);white-space:nowrap;min-width:60px;text-align:right}

/* ── 篩選列 ────────────────────────────────────────────── */
.filters{background:#fff;border-bottom:1px solid var(--border);
  padding:8px 16px;display:flex;flex-direction:column;gap:7px}
.filter-row{max-width:640px;margin:0 auto;width:100%;
  display:flex;align-items:center;gap:10px}
.filter-label{font-family:"Outfit";font-size:11px;font-weight:800;
  color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
  white-space:nowrap;min-width:30px}
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;font-family:"Outfit";font-size:12px;font-weight:600;
  padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);
  background:#fff;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── 主內容 ────────────────────────────────────────────── */
.feed{max-width:640px;margin:0 auto;padding:16px 16px 24px}

/* ── 日期分組標題 ──────────────────────────────────────── */
.date-hdr{font-family:"Outfit";font-size:12px;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  padding:20px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px}

/* ── 單字卡片 ───────────────────────────────────────────── */
.wcard{background:var(--card);border-radius:20px;padding:20px 20px 16px;
  margin-bottom:10px;border:1px solid var(--border);
  transition:box-shadow .25s,border-color .25s;scroll-margin-top:180px}
.wcard.active{border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light),0 4px 16px rgba(79,70,229,.1)}
.wcard.done{opacity:.5}

.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.card-num{font-family:"Outfit";font-size:11px;font-weight:800;
  letter-spacing:.06em;color:var(--muted);text-transform:uppercase;padding-top:2px}
.cat-chip{margin-left:auto;font-family:"Outfit";font-size:10px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;border-radius:8px;padding:3px 8px}
.cat-chip.會議{background:var(--accent-light);color:var(--accent)}
.cat-chip.商業{background:#FEF3C7;color:#92400E}
.cat-chip.科技{background:#D1FAE5;color:#065F46}
.cat-chip.財經{background:#FEE2E2;color:#991B1B}
.cat-chip.生活{background:#F3E8FF;color:#6B21A8}

.word-row{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.word-en{font-family:"Outfit";font-weight:800;font-size:30px;
  letter-spacing:-.02em;line-height:1.1;color:var(--ink)}
.pos-badge{font-family:"Noto Sans TC","Outfit",sans-serif;font-size:12px;font-weight:700;
  color:#7C3AED;background:#F3E8FF;border-radius:8px;padding:2px 9px;
  align-self:center;white-space:nowrap;border:1px solid #DDD6FE}
.icon-btn{background:none;border:none;cursor:pointer;font-size:18px;
  opacity:.45;padding:2px;transition:opacity .15s;line-height:1}
.icon-btn:hover{opacity:.9}
.icon-btn.mic{font-size:15px;border:1.5px solid var(--border);border-radius:12px;
  padding:2px 8px;opacity:.6;font-family:"Outfit";font-weight:700;font-size:11px;color:var(--muted)}
.icon-btn.mic:hover{border-color:var(--accent);color:var(--accent);opacity:1}
.icon-btn.mic:disabled{opacity:.3;cursor:default}

.ipa{font-family:"Outfit";font-size:13px;color:var(--muted);
  letter-spacing:.02em;margin-bottom:6px}
.phonetic-pill{display:inline-block;background:var(--gold-light);
  color:var(--gold);font-family:"Outfit";font-size:12.5px;font-weight:700;
  border-radius:8px;padding:3px 10px;margin-bottom:12px;border:1px solid #FDE68A}

.meaning{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:700;
  color:var(--ink);margin-bottom:14px;line-height:1.5}

.example-section{}
.ex-label{font-family:"Outfit";font-size:10px;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.ex-en{font-size:14px;color:var(--ink);line-height:1.65;
  display:flex;align-items:flex-start;gap:8px;margin-bottom:3px}
.ex-en span{flex:1}
.ex-zh{font-size:13px;color:var(--muted);line-height:1.55;margin-left:0}

.rec-result{margin:8px 0}
.rec-box{background:var(--bg);border-radius:12px;padding:10px 13px;font-size:13px;line-height:1.6}
.rec-box.rec-listening{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.rec-score{font-family:"Outfit";font-weight:800;font-size:14px;margin-bottom:5px}
.rec-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;font-size:12.5px}
.rec-lbl{font-weight:700;color:var(--muted);white-space:nowrap}

.rep-dots{display:flex;gap:5px;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border)}
.rdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:.25s}
.rdot.lit{background:var(--accent)}
.play-status{margin-top:8px;padding:7px 12px;background:var(--accent-light);
  border-radius:10px;font-family:"Outfit";font-size:12.5px;font-weight:700;
  color:var(--accent);display:flex;justify-content:space-between}
.play-status.hidden{display:none}

/* ── 文法卡片 ───────────────────────────────────────────── */
.gcard{background:var(--card);border-radius:20px;padding:20px;
  margin-bottom:10px;border:1px solid var(--border);
  border-left:3px solid var(--gold)}
.today-badge{display:inline-block;font-family:"Outfit";font-size:10px;
  font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  background:var(--accent-light);color:var(--accent);border-radius:8px;padding:2px 8px}
.gcat-chip{display:inline-block;font-family:"Outfit";font-size:10px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;background:var(--gold-light);
  color:var(--gold);border-radius:8px;padding:2px 8px;border:1px solid #FDE68A}
.g-title{font-family:"Noto Serif TC",serif;font-size:19px;font-weight:700;
  margin:8px 0 8px;line-height:1.4}
.g-rule{font-size:13.5px;color:#292524;line-height:1.7;margin-bottom:10px;
  background:#FAFAF9;border-radius:10px;padding:10px 12px;border:1px solid var(--border)}
.g-pattern-wrap{margin-bottom:12px}
.g-pattern-label{font-family:"Outfit";font-size:10px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.g-pattern{font-family:"Outfit";font-size:13px;color:var(--accent);font-weight:600;
  background:var(--accent-light);border-radius:8px;padding:6px 12px;
  display:block;line-height:1.5}
.g-ex-label{font-family:"Outfit";font-size:10px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.g-ex{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.g-ex-en{font-size:14px;color:var(--ink);line-height:1.6;
  display:flex;align-items:flex-start;gap:7px}
.g-ex-zh{font-size:12.5px;color:var(--muted);margin-top:3px;margin-left:26px}
.g-compare{background:#FFF5F5;border-radius:10px;padding:11px 13px;
  margin:10px 0;font-size:13px}
.g-wrong{color:var(--red);margin-bottom:5px;line-height:1.55}
.g-right{color:var(--green);font-weight:700;line-height:1.55}
.g-tip{font-size:13px;background:#FFFBEB;border-radius:10px;
  padding:10px 13px;color:#78350F;line-height:1.65;border:1px solid #FDE68A}

/* ── 底部播放列 ────────────────────────────────────────── */
.playbar{position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:rgba(255,255,255,.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--border)}

/* ── 文法說明框 ────────────────────────────────────────── */
.gram-box{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:12px;
  padding:10px 13px;margin:10px 0 4px}
.gram-title{font-family:"Outfit";font-size:11px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:#166534;margin-bottom:5px}
.gram-name{font-family:"Outfit";font-size:13px;font-weight:800;
  color:#15803D;background:#DCFCE7;border-radius:6px;
  padding:1px 8px;display:inline-block;margin-bottom:4px}
.gram-why{font-size:13px;color:#166534;line-height:1.6;margin-bottom:6px}
.gram-warn{font-size:12.5px;color:#9A3412;background:#FFF7ED;
  border-radius:8px;padding:5px 10px;border-left:2px solid #EA580C;
  line-height:1.55}
.gram-hl{background:#BBF7D0;border-radius:3px;padding:0 2px;
  font-weight:700;color:#166534;font-style:normal}

/* ── 發音細節 ──────────────────────────────────────────── */
.pron-detail{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;
  padding:10px 13px;margin:8px 0}
.pron-title{font-family:"Outfit";font-size:11px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:#92400E;margin-bottom:5px}
.pron-stress{font-size:13.5px;font-weight:600;color:#78350F;margin-bottom:4px}
.pron-stress b{color:var(--accent);font-size:15px;border-bottom:2px solid var(--accent)}
.pron-warn{font-size:12.5px;color:#9A3412;line-height:1.55}
.playbar-inner{max-width:640px;margin:0 auto;padding:8px 16px;
  display:flex;align-items:center;gap:8px}
.pb-prev,.pb-next{background:none;border:1.5px solid var(--border);
  border-radius:50%;width:38px;height:38px;font-size:16px;font-weight:700;
  cursor:pointer;color:var(--ink);transition:.15s;flex:0 0 auto}
.pb-prev:hover,.pb-next:hover{border-color:var(--accent);color:var(--accent)}
.pb-play{flex:1;background:var(--accent);color:#fff;border:none;
  border-radius:24px;height:44px;font-family:"Outfit";font-size:14px;
  font-weight:800;cursor:pointer;letter-spacing:.02em;transition:opacity .15s}
.pb-play:active{opacity:.8}
.pb-settings{background:none;border:1.5px solid var(--border);
  border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;
  transition:.15s;flex:0 0 auto}
.pb-settings:hover{border-color:var(--ink)}
.playbar-speed{max-width:640px;margin:0 auto;
  display:flex;align-items:center;gap:8px;padding:0 16px 10px}
.speed-icon{font-size:14px;flex:0 0 auto}
.playbar-speed input[type=range]{flex:1;accent-color:var(--accent);height:3px}
.speed-val{font-family:"Outfit";font-size:12px;font-weight:800;
  color:var(--accent);min-width:32px;text-align:right}

/* ── 設定抽屜 ──────────────────────────────────────────── */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:45}
.settings-overlay.open{display:block}
.settings-drawer{position:fixed;bottom:-200px;left:0;right:0;z-index:50;
  background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;
  transition:bottom .3s cubic-bezier(.32,.72,0,1);border-top:1px solid var(--border)}
.settings-drawer.open{bottom:0}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:4px;
  margin:0 auto 18px}
.drawer-title{font-family:"Outfit";font-weight:800;font-size:13px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;
  max-width:640px;margin-left:auto;margin-right:auto}
.drawer-row{display:flex;align-items:center;gap:12px;max-width:640px;
  margin:0 auto 12px;font-family:"Outfit";font-size:14px;font-weight:600;color:var(--ink)}
.drawer-row input[type=range]{flex:1;accent-color:var(--accent)}
.drawer-row .rval{min-width:36px;font-weight:800;color:var(--accent);font-size:14px}
.toggle-label{display:flex;align-items:center;gap:8px;cursor:pointer;
  max-width:640px;margin:0 auto}
.toggle-label input{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}

.foot{text-align:center;font-size:11px;color:var(--muted);padding:12px 16px;
  line-height:1.7;max-width:640px;margin:0 auto}
.empty-msg{text-align:center;padding:48px 16px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">📚 <span>英文</span>學習日報</div>
    <div class="hdate" id="dateBadge">2026/07/24</div>
  </div>
</div>

<div class="tabs" id="mainTabs"></div>

<div id="subBars">
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
      <div class="progress-label" id="progressText">0 / 30</div>
    </div>
  </div>
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">主題</span>
      <div class="chips" id="catBar"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">日期</span>
      <div class="chips" id="dateBar"></div>
    </div>
  </div>
</div>

<!-- 文法日期篩選列（切換到文法分頁時顯示） -->
<div id="gramBars" style="display:none">
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">日期</span>
      <div class="chips" id="gramDateBar"></div>
    </div>
  </div>
</div>

<div class="feed" id="feed"></div>

<div class="foot" id="foot">
  每個單字重複 3 次：單字 → 逐字母拼字 → 英文例句 → 中文例句
</div>

<!-- 設定抽屜 -->
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
<div class="settings-drawer" id="settingsDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">播報設定</div>
  <label class="toggle-label">
    <input type="checkbox" id="autoToggle"> 進入頁面自動播報
  </label>
</div>

<!-- 底部播放列（僅單字分頁顯示） -->
<div class="playbar" id="playbar">
  <div class="playbar-inner">
    <button class="pb-prev" onclick="prevWord()">‹</button>
    <button class="pb-play" id="playBtn" onclick="togglePlay()">▶ 播報全部</button>
    <button class="pb-next" onclick="nextWord()">›</button>
    <button class="pb-settings" onclick="toggleSettings()">⚙️</button>
  </div>
  <div class="playbar-speed">
    <span class="speed-icon">🐢</span>
    <input type="range" min="0.6" max="1.6" step="0.1" value="0.9"
           oninput="setRate(this.value)" id="rateSlider">
    <span class="speed-icon">🐇</span>
    <span class="speed-val" id="rateLabel">0.9x</span>
  </div>
</div>

e.", "example_zh": "通貨膨脹上升會隨時間侵蝕購買力。", "example2": "Central banks raised interest rates to combat rising inflation.", "example2_zh": "央行提高利率以應對通貨膨脹上升。", "pos": "名詞"}, {"word": "equity", "ipa": "/ˈɛkwɪti/", "phonetic": "EK-wuh-tee", "zh": "股權；公平", "category": "商業", "example": "They offered equity as part of the compensation package.", "example_zh": "他們提供股權作為薪酬方案的一部分。", "example2": "The startup raised capital in exchange for equity.", "example2_zh": "這家新創公司以股權換取了資金。", "pos": "名詞"}, {"word": "follow-up", "ipa": "/ˈfɒloʊˌʌp/", "phonetic": "FOL-oh-up", "zh": "後續跟進；追蹤", "category": "會議", "example": "I will send a follow-up email after the meeting.", "example_zh": "會後我會發送一封跟進郵件。", "example2": "A follow-up call was scheduled for the following Tuesday.", "example2_zh": "後續通話安排在下週二。", "pos": "名詞／形容詞"}, {"word": "facilitate", "ipa": "/fəˈsɪlɪteɪt/", "phonetic": "fuh-SIL-uh-tayt", "zh": "促進；主持（會議）", "category": "會議", "example": "She was asked to facilitate the workshop.", "example_zh": "她被要求主持這場工作坊。", "example2": "Good leaders facilitate discussions rather than dominate them.", "example2_zh": "好的領導者是促進討論，而不是主導討論。", "pos": "動詞"}, {"word": "versatile", "ipa": "/ˈvɜːrsətaɪl/", "phonetic": "VUR-suh-tyl", "zh": "多才多藝的；多功能的", "category": "生活", "example": "A versatile employee can handle a variety of tasks.", "example_zh": "多才多藝的員工可以處理各種任務。", "example2": "A versatile professional can contribute to multiple teams and projects.", "example2_zh": "多才多藝的專業人士可以為多個團隊和專案做出貢獻。", "pos": "形容詞"}, {"word": "compliance", "ipa": "/kəmˈplaɪəns/", "phonetic": "kum-PLY-uns", "zh": "合規；遵從", "category": "商業", "example": "All employees must attend the compliance training.", "example_zh": "所有員工必須參加合規培訓。", "example2": "The new compliance framework applies to all global offices.", "example2_zh": "新的合規框架適用於所有全球辦事處。", "pos": "名詞"}, {"word": "scalable", "ipa": "/ˈskeɪləbəl/", "phonetic": "SKAY-luh-bul", "zh": "可擴展的；可規模化的", "category": "商業", "example": "We need a scalable solution for our growing customer base." nded their business through a franchise model.", "example_zh": "他們透過加盟模式擴展業務。", "example2": "She bought a franchise and opened three locations in two years.", "example2_zh": "她購買了加盟權，兩年內開了三家分店。", "pos": "名詞／動詞"}, {"word": "merger", "ipa": "/ˈmɜːrdʒər/", "phonetic": "MUR-jer", "zh": "合併", "category": "商業", "example": "The merger created the largest company in the sector.", "example_zh": "這次合併創造了該行業最大的公司。", "example2": "The merger resulted in significant cost savings for both parties.", "example2_zh": "合併為雙方帶來了顯著的成本節省。", "pos": "名詞"}, {"word": "cybersecurity", "ipa": "/ˌsaɪbərsɪˈkjʊərɪti/", "phonetic": "SY-ber-sih-KYOOR-uh-tee", "zh": "網路安全", "category": "科技", "example": "Investing in cybersecurity is critical for every business.", "example_zh": "投資網路安全對每個企業都至關重要。", "example2": "Cybersecurity threats are becoming more sophisticated each year.", "example2_zh": "每年網路安全威脅變得越來越複雜。", "pos": "名詞"}, {"word": "delegate", "ipa": "/ˈdɛlɪɡeɪt/", "phonetic": "DEL-uh-gayt", "zh": "授權；委派；代表", "category": "會議", "example": "A good manager knows how to delegate tasks effectively.", "example_zh": "好的管理者知道如何有效授權。", "example2": "She learned to delegate work so she could focus on strategy.", "example2_zh": "她學會了授權，以便集中精力在策略上。", "pos": "動詞／名詞"}, {"word": "blockchain", "ipa": "/ˈblɒktʃeɪn/", "phonetic": "BLOK-chayn", "zh": "區塊鏈", "category": "科技", "example": "Blockchain technology ensures transparent and secure transactions.", "example_zh": "區塊鏈技術確保交易透明且安全。", "example2": "The supply chain team is exploring blockchain for better traceability.", "example2_zh": "供應鏈團隊正在探索區塊鏈以提升可追溯性。", "pos": "名詞"}, {"word": "portfolio", "ipa": "/pɔːrtˈfoʊlioʊ/", "phonetic": "port-FOH-lee-oh", "zh": "投資組合；作品集", "category": "財經", "example": "A balanced portfolio includes stocks, bonds, and real estate.", "example_zh": "均衡的投資組合包括股票、債券和房地產。", "example2": "Rebalancing your portfolio quarterly helps maintain your target allocation.", "example2_zh": "每季重新平衡投資組合有助於維持目標配置。", "pos": "名詞"}, {"word": "optimization", "ipa": "/ˌɒptɪmaɪˈzeɪʃən/", "phonetic": "op-tuh-my-ZAY-shun", "zh": "優化", "category": "科技", "example": "Search engine optimization improves your website ranking.", "example_zh": "搜尋引擎優化提升您的網站排名。", "example2": "Database optimization reduced our page load time by 40%.", "example2_zh": "資料庫優化將我們的頁面載入時間縮短了40%。", "pos": "名詞"}, {"word": "agile", "ipa": "/ˈædʒaɪl/", "phonetic": "AJ-ul", "zh": "敏捷的；靈活的（開發方法）", "category": "科技", "example": "The team uses agile methodology for software development.", "example_zh": "團隊使用敏捷方法論進行軟體開發。", "example2": "Adopting agile practices helped the team ship features faster.", "example2_zh": "採用敏捷實踐幫助團隊更快地發布功能。", "pos": "形容詞"}, {"word": "mentor", "ipa": "/ˈmɛntɔːr/", "phonetic": "MEN-tor", "zh": "導師；指導者", "category": "生活", "example": "Having a mentor can accelerate your career growth.", "example_zh": "有一位導師可以加速你的職業發展。", "example2": "She mentored three junior employees who all received promotions.", "example2_zh": "她指導了三位初級員工，他們都獲得了晉升。", "pos": "名詞／動詞"}, {"word": "resolution", "ipa": "/ˌrɛzəˈluːʃən/", "phonetic": "rez-uh-LOO-shun", "zh": "決議；解決方案", "category": "會議", "example": "The board passed a resolution to expand overseas.", "example_zh": "董事會通過了海外擴張的決議。", "example2": "The resolution was adopted with a majority vote.", "example2_zh": "該決議以多數票通過。", "pos": "名詞"}, {"word": "milestone", "ipa": "/ˈmaɪlstoʊn/", "phonetic": "MYLE-stone", "zh": "里程碑；重要節點", "category": "會議", "example": "We hit a major milestone by completing the prototype.", "example_zh": "完成原型機是我們達到的重要里程碑。", "example2": "Signing the first overseas client was a major milestone for us.", "example2_zh": "簽下第一個海外客戶是我們的重要里程碑。", "pos": "名詞"}, {"word": "outsource", "ipa": "/ˈaʊtsɔːrs/", "phonetic": "OWT-sors", "zh": "外包", "category": "商業", "example": "Many companies outsource IT support to reduce costs.", "example_zh": "許多公司將IT支援外包以降低成本。", "example2": "We plan to outsource logistics to reduce operational costs.", "example2_zh": "我們計劃外包物流以降低營運成本。", "pos": "動詞"}], "grammar": [{"title": "強調句型：It is... that/who...", "category": "句型結構", "rule": "把要強調的成分移到 It is 後面，其餘用 that/who 連接。", "pattern": "It is/was [強調部分] that/who [其餘部分].", "examples": [{"en": "It was the marketing team that identified this opportunity.", "zh": "正是行銷團隊發現了這個機會。"}, {"en": "It is the quality of our product that sets us apart from competitors.", "zh": "正是我們產品的品質使我們有別於競爭對手。"}, {"en": "It was the client who requested an urgent revision.", "zh": "正是客戶要求緊急修改的。"}], "wrong": "It is that the marketing team identified this opportunity.", "right": "It was the marketing team that identified this opportunity.", "tip": "強調人用 who，強調其他成分用 that。"}, {"title": "簡報開場白", "category": "簡報技巧", "rule": "正式開場的標準句型。清楚說明目的、時間和結構。", "pattern": "I'd like to / Today I'm going to + [動詞原形]...", "examples": [{"en": "Good morning. I'd like to present our Q3 financial results.", "zh": "早安。我想報告我們第三季的財務業績。"}, {"en": "Today I'm going to walk you through our new product roadmap.", "zh": "今天我將帶大家了解我們新的產品路線圖。"}, {"en": "My presentation will cover three main areas: market analysis, strategy, and implementation.", "zh": "我的簡報將涵蓋三個主要領域：市場分析、策略和執行。"}], "wrong": "I will tell you about our results today.", "right": "I'd like to present our Q3 financial results.", "tip": "I'd like to（較正式）。結尾說 I'll be happy to take any questions at the end."}, {"title": "表示對比：On the other hand / In contrast", "category": "連接詞", "rule": "提出不同觀點或相反情況。in contrast 強調差異；on the other hand 提出另一方觀點。", "pattern": "On the other hand, [句子]. / In contrast, [句子].", "examples": [{"en": "The first option is cheaper. On the other hand, it takes longer to implement.", "zh": "第一個選項更便宜。另一方面，實施起來需要更長時間。"}, {"en": "Our revenue increased by 20%. In contrast, our main competitor saw a decline.", "zh": "我們的收入增長了20%。相比之下，主要競爭對手出現了下滑。"}, {"en": "The new system is more complex. On the other hand, it offers more features.", "zh": "新系統更複雜。另一方面，它提供了更多功能。"}], "wrong": "On the other hand the option is cheaper.", "right": "The first option is cheaper. On the other hand, it takes longer.", "tip": "On the other hand / In contrast 句首加逗號。"}, {"title": "第二條件句 — 假設情況", "category": "條件句", "rule": "If + 過去式, would + 動詞原形。用於假設或不太可能的情況。", "pattern": "If we [過去式], we would [動詞原形].", "examples": [{"en": "If we had more resources, we would launch the product sooner.", "zh": "如果我們有更多資源，我們會更早推出產品。"}, {"en": "If I were in your position, I would negotiate the terms.", "zh": "如果我在您的立場，我會談判條款。"}, {"en": "If we reduced headcount, it would impact productivity.", "zh": "如果我們裁員，將會影響生產力。"}], "wrong": "If we would have more resources, we would launch sooner.", "right": "If we had more resources, we would launch sooner.", "tip": "if 子句用過去式（be 動詞用 were，不用 was），主句用 would。"}]}, "2026-06-13": {"words": [{"word": "convene", "ipa": "/kənˈviːn/", "phonetic": "kun-VEEN", "zh": "召開（會議）；集合", "category": "會議", "example": "The board will convene an emergency meeting tomorrow.", "example_zh": "董事會明天將召開緊急會議。", "example2": "The emergency task force will convene first thing tomorrow.", "example2_zh": "緊急任務小組明天一早將召開會議。", "pos": "動詞"}, {"word": "amortization", "ipa": "/əˌmɔːrtɪˈzeɪʃən/", "phonetic": "uh-mor-tuh-ZAY-shun", "zh": "攤銷；分期償還", "category": "財經", "example": "The loan amortization schedule shows monthly payments.", "example_zh": "貸款攤銷時間表顯示每月還款金額。", "example2": "The software license cost is spread through amortization over five years.", "example2_zh": "軟體授權費用透過五年攤銷分攤。", "pos": "名詞"}, {"word": "iteration", "ipa": "/ˌɪtəˈreɪʃən/", "phonetic": "it-uh-RAY-shun", "zh": "迭代；反覆修改", "category": "科技", "example": "Each iteration of the product improves based on feedback.", "example_zh": "產品的每次迭代都根據回饋進行改進。", "example2": "We are on the fifth iteration and the product is much improved.", "example2_zh": "我們已進行第五次迭代，產品改善了很多。", "pos": "名詞"}, {"word": "facilitate", "ipa": "/fəˈsɪlɪteɪt/", "phonetic": "fuh-SIL-uh-tayt", "zh": "促進；主持（會議）", "category": "會議", "example": "She was asked to facilitate the workshop.", "example_zh": "她被要求主持這場工作坊。", "example2": "Good leaders facilitate discussions rather than dominate them.", "example2_zh": "好的領導者是促進討論，而不是主導討論。", "pos": "動詞"}, {"word": "diversification", "ipa": "/daɪˌvɜːrsɪfɪˈkeɪʃən/", "phonetic": "dy-vur-suh-fuh-KAY-shun", "zh": "多元化；分散投資", "category": "財經", "example": "Portfolio diversification reduces investment risk.", "example_zh": "投資組合多元化可降低投資風險。", "example2": "Geographic diversification protects the portfolio from local downturns.", "example2_zh": "地域多元化可保護投資組合免受當地經濟下滑的影響。", "pos": "名詞"}, {"word": "transparent", "ipa": "/trænsˈpærənt/", "phonetic": "trans-PAIR-unt", "zh": "透明的；坦誠的", "category": "生活", "example": "Leaders should be transparent about company challenges.", "example_zh": "領導者應該對公司挑戰保持透明。", "example2": "We believe in being transparent about our pricing and policies.", "example2_zh": "我們相信對定價和政策保持透明。", "pos": "形容詞"}, {"word": "adjourn", "ipa": "/əˈdʒɜːrn/", "phonetic": "uh-JURN", "zh": "散會；休會", "category": "會議", "example": "The meeting was adjourned until next Monday.", "example_zh": "會議休會至下週一。", "example2": "The chairperson proposed to adjourn until further notice.", "example2_zh": "主席提議休會，待進一步通知再開。", "pos": "動詞"}, {"word": "subsidiary", "ipa": "/səbˈsɪdiɛri/", "phonetic": "sub-SID-ee-air-ee", "zh": "子公司", "category": "商業", "example": "The subsidiary operates independently in the Asian market.", "example_zh": "該子公司在亞洲市場獨立運營。", "example2": "The Chinese subsidiary will handle all Asia-Pacific operations.", "example2_zh": "中國子公司將負責所有亞太地區業務。", "pos": "名詞"}, {"word": "benchmark", "ipa": "/ˈbɛntʃmɑːrk/", "phonetic": "BENCH-mark", "zh": "基準；標竿", "category": "商業", "example": "Our performance is measured against industry benchmarks.", "example_zh": "我們的表現以行業基準來衡量。", "example2": "We regularly benchmark our pricing against competitors.", "example2_zh": "我們定期將定價與競爭對手進行基準比較。", "pos": "名詞／動詞"}, {"word": "revenue", "ipa": "/ˈrɛvɪnjuː/", "phonetic": "REV-uh-nyoo", "zh": "收益；營業額", "category": "商業", "example": "Annual revenue grew by 15% compared to last year.", "example_zh": "年收益比去年增長了15%。", "example2": "Subscription-based revenue provides more predictable cash flow.", "example2_zh": "訂閱制收入提供了更可預測的現金流。", "pos": "名詞"}, {"word": "assertive", "ipa": "/əˈsɜːrtɪv/", "phonetic": "uh-SUR-tiv", "zh": "果斷的；自信表達的", "category": "生活", "example": "Being assertive helps you communicate your needs clearly.", "example_zh": "果斷有助於你清楚地溝通自己的需求。", "example2": "Be assertive when negotiating; know what you want and ask for it.", "example2_zh": "談判時要果斷；清楚自己想要什麼並直接提出。", "pos": "形容詞"}, {"word": "minutes", "ipa": "/ˈmɪnɪts/", "phonetic": "MIN-its", "zh": "會議記錄", "category": "會議", "example": "Who will take the minutes during today's meeting?", "example_zh": "今天的會議記錄由誰負責？", "example2": "The minutes confirmed that the budget proposal was approved.", "example2_zh": "會議記錄確認預算提案已獲批准。", "pos": "名詞"}, {"word": "sustainable", "ipa": "/səˈsteɪnəbəl/", "phonetic": "suh-STAY-nuh-bul", "zh": "可持續的；永續的", "category": "生活", "example": "The company is committed to sustainable business practices.", "example_zh": "公司致力於可持續的商業實踐。", "example2": "Long-term success requires building a sustainable business model.", "example2_zh": "長期成功需要建立可持續的商業模式。", "pos": "形容詞"}, {"word": "empathy", "ipa": "/ˈɛmpəθi/", "phonetic": "EM-puh-thee", "zh": "同理心；設身處地", "category": "生活", "example": "Empathy is a key skill for effective leadership.", "example_zh": "同理心是有效領導的關鍵技能。", "example2": "Managers who show empathy build stronger, more loyal teams.", "example2_zh": "展現同理心的管理者建立更強大、更忠誠的團隊。", "pos": "名詞"}, {"word": "deployment", "ipa": "/dɪˈplɔɪmənt/", "phonetic": "duh-PLOY-ment", "zh": "部署；發布", "category": "科技", "example": "The deployment of the new system was completed overnight.", "example_zh": "新系統的部署在一夜之間完成。", "example2": "Automated deployment pipelines reduce human error significantly.", "example2_zh": "自動化部署流程大幅減少了人為錯誤。", "pos": "名詞"}, {"word": "liquidity", "ipa": "/lɪˈkwɪdɪti/", "phonetic": "luh-KWID-uh-tee", "zh": "流動性；變現能力", "category": "財經", "example": "High liquidity means assets can be quickly converted to cash.", "example_zh": "高流動性意味著資產可以快速轉換為現金。", "example2": "During the crisis, even well-performing assets faced liquidity problems.", "example2_zh": "危機期間，即使表現良好的資產也面臨流動性問題。", "pos": "名詞"}, {"word": "delegate", "ipa": "/ˈdɛlɪɡeɪt/", "phonetic": "DEL-uh-gayt", "zh": "授權；委派；代表", "category": "會議", "example": "A good manager knows how to delegate tasks effectively.", "example_zh": "好的管理者知道如何有效授權。", "example2": "She learned to delegate work so she could focus on strategy.", "example2_zh": "她學會了授權，以便集中精力在策略上。", "pos": "動詞／名詞"}, {"word": "return on investment", "ipa": "/rɪˈtɜːrn ɒn ɪnˈvɛstmənt/", "phonetic": "ruh-TURN on in-VEST-ment", "zh": "投資報酬率（ROI）", "category": "財經", "example": "This marketing campaign had an excellent return on investment.", "example_zh": "這次行銷活動有出色的投資報酬率。", "example2": "Calculating return on investment helps prioritize spending decisions.", "example2_zh": "計算投資報酬率有助於確定支出決策的優先順序。", "pos": "名詞片語"}, {"word": "hedge fund", "ipa": "/ˈhɛdʒ fʌnd/", "phonetic": "HEJ fund", "zh": "對沖基金", "category": "財經", "example": "Hedge funds often use complex strategies to generate returns.", "example_zh": "對沖基金常使用複雜策略來產生回報。", "example2": "The hedge fund posted a 30% return even during the market downturn.", "example2_zh": "即使在市場低迷期間，對沖基金也錄得30%的回報。", "pos": "名詞片語"}, {"word": "portfolio", "ipa": "/pɔːrtˈfoʊlioʊ/", "phonetic": "port-FOH-lee-oh", "zh": "投資組合；作品集", "category": "財經", "example": "A balanced portfolio includes stocks, bonds, and real estate.", "example_zh": "均衡的投資組合包括股票、債券和房地產。", "example2": "Rebalancing your portfolio quarterly helps maintain your target allocation.", "example2_zh": "每季重新平衡投資組合有助於維持目標配置。", "pos": "名詞"}, {"word": "firewall", "ipa": "/ˈfaɪərwɔːl/", "phonetic": "FY-er-wall", "zh": "防火牆", "category": "科技", "example": "The firewall blocked the unauthorized access attempt.", "example_zh": "防火牆阻擋了未授權的存取嘗試。", "example2": "The firewall rules were updated to allow traffic from new IPs.", "example2_zh": "防火牆規則已更新，以允許來自新IP的流量。", "pos": "名詞"}, {"word": "user experience", "ipa": "/ˈj ", "category": "會議", "example": "The board will convene an emergency meeting tomorrow.", "example_zh": "董事會明天將召開緊急會議。", "example2": "The emergency task force will convene first thing tomorrow.", "example2_zh": "緊急任務小組明天一早將召開會議。", "pos": "動詞"}], "grammar": [{"title": "確認理解：If I understand correctly...", "category": "澄清確認", "rule": "重述對方的意思以確認自己理解正確，商務溝通中避免誤解的關鍵技巧。", "pattern": "If I understand correctly, [重述]. / So what you're saying is [重述]?", "examples": [{"en": "If I understand correctly, you want to delay the project by two weeks?", "zh": "如果我理解正確，您想將專案延遲兩週？"}, {"en": "So what you're saying is that the budget needs to be approved first?", "zh": "所以您的意思是預算需要先獲得批准？"}, {"en": "Let me confirm — you need the report by Monday morning, correct?", "zh": "讓我確認一下——您需要在週一早上前收到報告，對嗎？"}], "wrong": "You mean delay two weeks?", "right": "If I understand correctly, you want to delay the project by two weeks?", "tip": "用完整句型重述，讓對方確認，可以避免很多誤解。"}, {"title": "表達意見：In my opinion / I believe", "category": "表達意見", "rule": "提出個人看法時使用，讓對方知道這是你的觀點，不是事實。", "pattern": "In my opinion, [觀點]. / I believe [that] [觀點].", "examples": [{"en": "In my opinion, we should prioritize customer satisfaction over cost-cutting.", "zh": "在我看來，我們應該把客戶滿意度放在降低成本之上。"}, {"en": "I believe this partnership will benefit both companies significantly.", "zh": "我相信這次合作將對兩家公司都大有裨益。"}, {"en": "In my view, the timeline is too aggressive.", "zh": "在我看來，這個時間表太緊迫了。"}], "wrong": "In my opinion is that we should prioritize customers.", "right": "In my opinion, we should prioritize customers.", "tip": "In my opinion 後面直接接句子，不加 is that。"}, {"title": "商務常見片語動詞", "category": "片語動詞", "rule": "片語動詞 = 動詞 + 介系詞/副詞，整體意思與原動詞不同，必須整組記憶。", "pattern": "[動詞] + [介系詞/副詞]", "examples": [{"en": "Please follow up with the client about the contract status.", "zh": "請跟進客戶了解合約狀態。"}, {"en": "We need to put off the meeting until next week.", "zh": "我們需要將會議推遲到下週。"}, {"en": "Let's go over the proposal before presenting it to the client.", "zh": "在向客戶呈報之前，我們先看一遍提案。"}], "wrong": "Please follow the client up about the contract.", "right": "Please follow up with the client about the contract.", "tip": "follow up with（跟進）/ put off（推遲）/ go over（審閱）/ carry out（執行）/ look into（調查）。"}, {"title": "描述趨勢：rise/fall/increase/decrease", "category": "數字統計", "rule": "描述數字變化的動詞（直接用）和名詞（搭配形容詞）。", "pattern": "[指標] + [動詞] + by [數量] / a [形容詞] + [名詞] + in [指標]", "examples": [{"en": "Revenue rose by 15% compared to last year.", "zh": "與去年相比，收入上升了15%。"}, {"en": "There was a significant drop in production costs last quarter.", "zh": "上季度生產成本大幅下降。"}, {"en": "Sales have increased steadily over the past three months.", "zh": "過去三個月銷售額穩步上升。"}], "wrong": "Revenue rose by 15% is an increase.", "right": "Revenue rose by 15% compared to last year.", "tip": "形容詞搭配：sharp/dramatic（大幅）/ steady/gradual（穩定）/ slight/marginal（輕微）。"}]}, "2026-06-16": {"words": [{"word": "prototype", "ipa": "/ˈproʊtətaɪp/", "phonetic": "PRO-tuh-typ", "zh": "原型；雛形", "category": "科技", "example": "We built a prototype to test the concept with users.", "example_zh": "我們建立了原型來與用戶測試概念。", "example2": "The engineering team built three prototypes before settling on a design.", "example2_zh": "工程團隊在確定設計前製作了三個原型。", "pos": "名詞／動詞"}, {"word": "unanimous", "ipa": "/juːˈnænɪməs/", "phonetic": "yoo-NAN-uh-mus", "zh": "全體一致的", "category": "會議", "example": "The vote was unanimous in favor of the proposal.", "example_zh": "投票結果全體一致支持該提案。", "example2": "Board members were unanimous in rejecting the proposal.", "example2_zh": "董事會成員一致反對該提案。", "pos": "形容詞"}, {"word": "firewall", "ipa": "/ˈfaɪərwɔːl/", "phonetic": "FY-er-wall", "zh": "防火牆", "category": "科技", "example": "The firewall blocked the unauthorized access attempt.", "example_zh": "防火牆阻擋了未授權的存取嘗試。", "example2": "The firewall rules were updated to allow traffic from new IPs.", "example2_zh": "防火牆規則已更新，以允許來自新IP的流量。", "pos": "名詞"}, {"word": "leverage", "ipa": "/ˈlɛvərɪdʒ/", "phonetic": "LEV-er-ij", "zh": "槓桿；善用資源", "category": "商業", "example  model.", "example2_zh": "長期成功需要建立可持續的商業模式。", "pos": "形容詞"}, {"word": "procurement", "ipa": "/prəˈkjʊərmənt/", "phonetic": "pruh-KYOOR-ment", "zh": "採購", "category": "商業", "example": "The procurement team negotiated better prices with suppliers.", "example_zh": "採購團隊與供應商談判了更好的價格。", "example2": "The procurement department is evaluating three new suppliers.", "example2_zh": "採購部門正在評估三家新供應商。", "pos": "名詞"}, {"word": "debrief", "ipa": "/diːˈbriːf/", "phonetic": "dee-BREEF", "zh": "彙報；事後討論", "category": "會議", "example": "Let's debrief after the client presentation.", "example_zh": "客戶簡報後我們來做個彙報。", "example2": "After the product launch, the team gathered to debrief.", "example2_zh": "產品發布後，團隊聚在一起做事後彙報。", "pos": "動詞／名詞"}, {"word": "arbitrage", "ipa": "/ˈɑːrbɪtrɑːʒ/", "phonetic": "AR-buh-trazh", "zh": "套利；仲裁", "category": "財經", "example": "Traders use arbitrage to profit from price differences.", "example_zh": "交易員利用套利從價格差異中獲利。", "example2": "Cryptocurrency arbitrage requires fast execution and low fees.", "example2_zh": "加密貨幣套利需要快速執行和低費用。", "pos": "名詞／動詞"}, {"word": "overhead", "ipa": "/ˈoʊvərˌhɛd/", "phonetic": "OH-ver-hed", "zh": "管銷費用；間接成本", "category": "商業", "example": "Reducing overhead costs is essential for profitability.", "example_zh": "降低管銷費用對盈利能力至關重要。", "example2": "Automating routine tasks helped cut overhead by 25%.", "example2_zh": "自動化例行任務幫助降低了25%的管銷費用。", "pos": "名詞"}, {"word": "deadline", "ipa": "/ˈdɛdlaɪn/", "phonetic": "DED-lyn", "zh": "截止日期", "category": "生活", "example": "Always submit your work before the deadline.", "example_zh": "始終在截止日期前提交你的工作。", "example2": "Missing a deadline reflects poorly on your reliability.", "example2_zh": "錯過截止日期會對你的可靠性產生負面影響。", "pos": "名詞"}, {"word": "moderator", "ipa": "/ˈmɒdəreɪtər/", "phonetic": "MOD-uh-ray-ter", "zh": "主持人；協調人", "category": "會議", "example": "The moderator kept the discussion on track.", "example_zh": "主持人讓討論保持在正確方向。", "example2": "The moderator skillfully managed the Q&A session.", "example2_zh": "主持人熟練 aise them now.", "zh": "如果您有任何顧慮，請現在提出。"}], "wrong": "If we will close this deal, we will exceed our target.", "right": "If we close this deal, we will exceed our target.", "tip": "if 子句用現在式，不用 will（這是最常見的錯誤！）"}, {"title": "表達意見：In my opinion / I believe", "category": "表達意見", "rule": "提出個人看法時使用，讓對方知道這是你的觀點，不是事實。", "pattern": "In my opinion, [觀點]. / I believe [that] [觀點].", "examples": [{"en": "In my opinion, we should prioritize customer satisfaction over cost-cutting.", "zh": "在我看來，我們應該把客戶滿意度放在降低成本之上。"}, {"en": "I believe this partnership will benefit both companies significantly.", "zh": "我相信這次合作將對兩家公司都大有裨益。"}, {"en": "In my view, the timeline is too aggressive.", "zh": "在我看來，這個時間表太緊迫了。"}], "wrong": "In my opinion is that we should prioritize customers.", "right": "In my opinion, we should prioritize customers.", "tip": "In my opinion 後面直接接句子，不加 is that。"}, {"title": "商務常見片語動詞", "category": "片語動詞", "rule": "片語動詞 = 動詞 + 介系詞/副詞，整體意思與原動詞不同，必須整組記憶。", "pattern": "[動詞] + [介系詞/副詞]", "examples": [{"en": "Please follow up with the client about the contract status.", "zh": "請跟進客戶了解合約狀態。"}, {"en": "We need to put off the meeting until next week.", "zh": "我們需要將會議推遲到下週。"}, {"en": "Let's go over the proposal before presenting it to the client.", "zh": "在向客戶呈報之前，我們先看一遍提案。"}], "wrong": "Please follow the client up about the contract.", "right": "Please follow up with the client about the contract.", "tip": "follow up with（跟進）/ put off（推遲）/ go over（審閱）/ carry out（執行）/ look into（調查）。"}, {"title": "過去進行式 vs. 簡單過去式", "category": "時態", "rule": "過去進行式（was/were + V-ing）強調過去某時正在進行的動作。簡單過去式強調完成的動作。", "pattern": "We were [V-ing] when [事件發生] / We [過去式動詞] [時間]", "examples": [{"en": "We were reviewing the budget when the client called.", "zh": "我們正在審查預算時客戶打電話來了。"}, {"en": "The team was preparing the presentation all morning.", "zh": "整個上午團隊都在準備簡報。"}, {"en": "While I was attending the conference, the deal was finalized.", "zh": "當我在參加會議時，交易已經敲定。"}], "wrong": "We reviewed the budget when the cl ": "表示對比：However / Although", "category": "連接詞", "rule": "However 放句首加逗號；Although 放在子句前面。表示轉折或對比。", "pattern": "However, [句子]. / Although [子句], [主句].", "examples": [{"en": "The project is on schedule. However, the budget is running low.", "zh": "專案進展順利。然而，預算正在減少。"}, {"en": "Although the market is challenging, we remain optimistic.", "zh": "雖然市場充滿挑戰，我們仍然保持樂觀。"}, {"en": "The results are promising. However, we need more data.", "zh": "結果很有希望。然而，我們需要更多數據。"}], "wrong": "However the project is on schedule, the budget is low.", "right": "The project is on schedule. However, the budget is running low.", "tip": "However 是副詞，後面加逗號，不能像 although 一樣連接兩個子句。"}, {"title": "in / on / at — 時間介系詞", "category": "介系詞", "rule": "at 用於具體時刻；on 用於日期和星期；in 用於月份、年份、時段。", "pattern": "at [時刻] / on [日期/星期] / in [月/年/時段]", "examples": [{"en": "The meeting starts at 9 AM on Monday.", "zh": "會議在週一上午9點開始。"}, {"en": "We will launch the product in Q3.", "zh": "我們將在第三季推出產品。"}, {"en": "The report is due on Friday, March 15th.", "zh": "報告的截止日期是3月15日（週五）。"}], "wrong": "The meeting starts in Monday at morning.", "right": "The meeting starts at 9 AM on Monday.", "tip": "at + 時刻、on + 日期/星期、in + 月份/季度/年份，不要混用。"}, {"title": "表示對比：On the other hand / In contrast", "category": "連接詞", "rule": "提出不同觀點或相反情況。in contrast 強調差異；on the other hand 提出另一方觀點。", "pattern": "On the other hand, [句子]. / In contrast, [句子].", "examples": [{"en": "The first option is cheaper. On the other hand, it takes longer to implement.", "zh": "第一個選項更便宜。另一方面，實施起來需要更長時間。"}, {"en": "Our revenue increased by 20%. In contrast, our main competitor saw a decline.", "zh": "我們的收入增長了20%。相比之下，主要競爭對手出現了下滑。"}, {"en": "The new system is more complex. On the other hand, it offers more features.", "zh": "新系統更複雜。另一方面，它提供了更多功能。"}], "wrong": "On the other hand the option is cheaper.", "right": "The first option is cheaper. On the other hand, it takes longer.", "tip": "On the other hand / In contrast 句首加逗號。"}]}, "2026-06-20": {"words": [{"word": "repository", " : "optimization", "ipa": "/ˌɒptɪmaɪˈzeɪʃən/", "phonetic": "op-tuh-my-ZAY-shun", "zh": "優化", "category": "科技", "example": "Search engine optimization improves your website ranking.", "example_zh": "搜尋引擎優化提升您的網站排名。", "example2": "Database optimization reduced our page load time by 40%.", "example2_zh": "資料庫優化將我們的頁面載入時間縮短了40%。", "pos": "名詞"}, {"word": "diversification", "ipa": "/daɪˌvɜːrsɪfɪˈkeɪʃən/", "phonetic": "dy-vur-suh-fuh-KAY-shun", "zh": "多元化；分散投資", "category": "財經", "example": "Portfolio diversification reduces investment risk.", "example_zh": "投資組合多元化可降低投資風險。", "example2": "Geographic diversification protects the portfolio from local downturns.", "example2_zh": "地域多元化可保護投資組合免受當地經濟下滑的影響。", "pos": "名詞"}, {"word": "incentive", "ipa": "/ɪnˈsɛntɪv/", "phonetic": "in-SEN-tiv", "zh": "激勵；獎勵", "category": "商業", "example": "Performance bonuses are a great incentive for employees.", "example_zh": "績效獎金是員工的絕佳激勵。", "example2": "Stock options serve as a long-term incentive for key employees.", "example2_zh": "股票期權作為關鍵員工的長期激勵。", "pos": "名詞"}, {"word": "multitask", "ipa": "/ˈmʌltiˌtæsk/", "phonetic": "MUL-tee-task", "zh": "同時處理多項工作", "category": "生活", "example": "Effective professionals know how to multitask efficiently.", "example_zh": "高效的專業人士知道如何高效地同時處理多項工作。", "example2": "Though common, trying to multitask often reduces overall quality.", "example2_zh": "雖然很普遍，但嘗試同時處理多項工作往往會降低整體質量。", "pos": "動詞"}, {"word": "bull market", "ipa": "/ˈbʊl ˈmɑːrkɪt/", "phonetic": "BOOL MAR-kit", "zh": "牛市（股市上漲）", "category": "財經", "example": "The tech sector thrived during the bull market.", "example_zh": "科技板塊在牛市期間蓬勃發展。", "example2": "The current bull market has lasted longer than most analysts expected.", "example2_zh": "當前牛市持續的時間比大多數分析師預期的要長。", "pos": "名詞片語"}, {"word": "venture", "ipa": "/ˈvɛntʃər/", "phonetic": "VEN-cher", "zh": "冒險；合資企業", "category": "商業", "example": "They launched a joint venture with a European partner.", "example_zh": "他們與一家歐洲合作夥伴成立了合資企業。", "example2": "The venture proved profitable within 18 months of launch.", "example2_zh": "這項合資企業在啟動後18個月內就實現了盈利。", "pos": "名詞／動詞"}, {"word": "firewall", "ipa": "/ˈfaɪərwɔːl/", "phonetic": "FY-er-wall", "zh": "防火牆", "category": "科技", "example": "The firewall blocked the unauthorized access attempt.", "example_zh": "防火牆阻擋了未授權的存取嘗試。", "example2": "The firewall rules were updated to allow traffic from new IPs.", "example2_zh": "防火牆規則已更新，以允許來自新IP的流量。", "pos": "名詞"}, {"word": "debugging", "ipa": "/diːˈbʌɡɪŋ/", "phonetic": "dee-BUG-ing", "zh": "除錯；找出並修復錯誤", "category": "科技", "example": "Debugging the code took longer than expected.", "example_zh": "程式碼除錯花的時間比預期要長。", "example2": "Proper logging makes debugging much faster and easier.", "example2_zh": "適當的日誌記錄使除錯更快、更容易。", "pos": "名詞"}, {"word": "delegate", "ipa": "/ˈdɛlɪɡeɪt/", "phonetic": "DEL-uh-gayt", "zh": "授權；委派；代表", "category": "會議", "example": "A good manager knows how to delegate tasks effectively.", "example_zh": "好的管理者知道如何有效授權。", "example2": "She learned to delegate work so she could focus on strategy.", "example2_zh": "她學會了授權，以便集中精力在策略上。", "pos": "動詞／名詞"}, {"word": "valuation", "ipa": "/ˌvæljuˈeɪʃən/", "phonetic": "val-yoo-AY-shun", "zh": "估值；評估", "category": "財經", "example": "The startup received a valuation of one billion dollars.", "example_zh": "這家新創公司的估值達到了十億美元。", "example2": "A fair valuation requires both financial data and market comparisons.", "example2_zh": "公平的估值需要財務資料和市場比較。", "pos": "名詞"}, {"word": "constructive", "ipa": "/kənˈstrʌktɪv/", "phonetic": "kun-STRUK-tiv", "zh": "建設性的", "category": "生活", "example": "Please provide constructive feedback on the report.", "example_zh": "請對報告提供建設性的回饋。", "example2": "Even negative feedback can be helpful if it is constructive.", "example2_zh": "即使是負面的回饋，只要具有建設性就是有幫助的。", "pos": "形容詞"}], "grammar": [{"title": "表示對比：On the other hand / In contrast", "category": "連接詞", "rule": "提出不同觀點或相反情況。in contrast 強調差異；on the other hand 提出另一方觀點。", "pattern": "On the other hand, [句子]. / In contrast, [句子].", "examples": [{"en": "The first option is cheaper. On the other hand, it takes longer to implement.", "zh": "第一個選項更便宜。另一方面，實施起來需要更長時間。"}, {"en": "Our revenue increased by 20%. In contrast, our main competitor saw a decline.", "zh": "我們的收入增長了20%。相比之下，主要競爭對手出現了下滑。"}, {"en": "The new system is more complex. On the other hand, it offers more features.", "zh": "新系統更複雜。另一方面，它提供了更多功能。"}], "wrong": "On the other hand the option is cheaper.", "right": "The first option is cheaper. On the other hand, it takes longer.", "tip": "On the other hand / In contrast 句首加逗號。"}, {"title": "問接問句 — 禮貌問法", "category": "句型結構", "rule": "直接問句在商務場合可能太唐突，改用間接問句更有禮貌。", "pattern": "Could you tell me [what/when/how] + [直敘句語序]?", "examples": [{"en": "Could you tell me when the report will be ready?", "zh": "您能告訴我報告什麼時候會準備好嗎？"}, {"en": "Do you know how many people will attend the conference?", "zh": "您知道有多少人會參加會議嗎？"}, {"en": "I was wondering if you have reviewed the proposal yet.", "zh": "我想知道您是否已經審查過提案了。"}], "wrong": "Could you tell me when will the report be ready?", "right": "Could you tell me when the report will be ready?", "tip": "間接問句用直敘句語序（主詞在前），不用疑問句語序（助動詞不提前）。"}, {"title": "Must vs. Have to — 強制與義務", "category": "情態動詞", "rule": "must = 說話者認為必須（主觀）；have to = 外部規定必須（客觀）。", "pattern": "We must [動詞] / We have to [動詞]", "examples": [{"en": "We must deliver this project on time — it's non-negotiable.", "zh": "我們必須準時交付這個專案——這是不可協商的。"}, {"en": "All employees have to complete the compliance training.", "zh": "所有員工都必須完成合規培訓。"}, {"en": "You must not share confidential information externally.", "zh": "您絕對不能對外分享機密信息。"}], "wrong": "We must to deliver this project on time.", "right": "We must deliver this project on time.", "tip": "must 和 have to 後面都接動詞原形，不加 to。"}, {"title": "委婉不同意：I understand, however...", "category": "表達意見", "rule": "先認可對方觀點，再提出不同意見。這是商務英文中非常重要的禮貌技巧。", "pattern": "I understand your point, however [你的觀點]. / I see what you mean, but [補充].", "examples": [{"en": "I understand your concern 收益；營業額", "category": "商業", "example": "Annual revenue grew by 15% compared to last year.", "example_zh": "年收益比去年增長了15%。", "example2": "Subscription-based revenue provides more predictable cash flow.", "example2_zh": "訂閱制收入提供了更可預測的現金流。", "pos": "名詞"}, {"word": "scalable", "ipa": "/ˈskeɪləbəl/", "phonetic": "SKAY-luh-bul", "zh": "可擴展的；可規模化的", "category": "商業", "example": "We need a scalable solution for our growing customer base.", "example_zh": "我們需要一個可擴展的方案來應對不斷增長的客戶群。", "example2": "Investors prefer scalable business models with recurring revenue.", "example2_zh": "投資者偏好具有定期收入的可規模化商業模式。", "pos": "形容詞"}, {"word": "initiative", "ipa": "/ɪˈnɪʃɪətɪv/", "phonetic": "ih-NISH-ee-uh-tiv", "zh": "主動性；倡議", "category": "生活", "example": "Take the initiative and suggest solutions to your manager.", "example_zh": "主動出擊，向你的主管提出解決方案。", "example2": "She showed great initiative by proposing a solution before being asked.", "example2_zh": "她在被詢問之前就主動提出解決方案，展現了極大的主動性。", "pos": "名詞"}, {"word": "unanimous", "ipa": "/juːˈnænɪməs/", "phonetic": "yoo-NAN-uh-mus", "zh": "全體一致的", "category": "會議", "example": "The vote was unanimous in favor of the proposal.", "example_zh": "投票結果全體一致支持該提案。", "example2": "Board members were unanimous in rejecting the proposal.", "example2_zh": "董事會成員一致反對該提案。", "pos": "形容詞"}, {"word": "facilitate", "ipa": "/fəˈsɪlɪteɪt/", "phonetic": "fuh-SIL-uh-tayt", "zh": "促進；主持（會議）", "category": "會議", "example": "She was asked to facilitate the workshop.", "example_zh": "她被要求主持這場工作坊。", "example2": "Good leaders facilitate discussions rather than dominate them.", "example2_zh": "好的領導者是促進討論，而不是主導討論。", "pos": "動詞"}, {"word": "turnover", "ipa": "/ˈtɜːrnoʊvər/", "phonetic": "TURN-oh-ver", "zh": "營業額；人員流動率", "category": "商業", "example": "High employee turnover increases recruitment costs.", "example_zh": "高員工流動率增加了招募成本。", "example2": "High turnover in sales roles is costly and disrupts client relationships.", "example2_zh": "銷售職位的高人員流動率成本高昂，且會破壞客戶關係。", "pos": "名詞"}, {"word": "networking", "ipa": "/ˈnɛtwɜːrkɪŋ/", "phonetic": "NET-wur-king", "zh": "人脈建立；社交", "category": "生活", "example": "Networking events are great for meeting industry peers.", "example_zh": "社交活動非常適合結識行業同仁。", "example2": "Networking online can be as effective as meeting people in person.", "example2_zh": "線上建立人脈可以和面對面認識人一樣有效。", "pos": "名詞"}, {"word": "procurement", "ipa": "/prəˈkjʊərmənt/", "phonetic": "pruh-KYOOR-ment", "zh": "採購", "category": "商業", "example": "The procurement team negotiated better prices with suppliers.", "example_zh": "採購團隊與供應商談判了更好的價格。", "example2": "The procurement department is evaluating three new suppliers.", "example2_zh": "採購部門正在評估三家新供應商。", "pos": "名詞"}, {"word": "feedback", "ipa": "/ˈfiːdbæk/", "phonetic": "FEED-bak", "zh": "回饋；意見", "category": "生活", "example": "Regular feedback helps employees grow and improve.", "example_zh": "定期回饋有助於員工成長和進步。", "example2": "Open to feedback, she quickly improved her presentation skills.", "example2_zh": "她樂於接受回饋，很快就提升了簡報技巧。", "pos": "名詞"}, {"word": "franchise", "ipa": "/ˈfræntʃaɪz/", "phonetic": "FRAN-chyz", "zh": "特許經營；加盟", "category": "商業", "example": "They expanded their business through a franchise model.", "example_zh": "他們透過加盟模式擴展業務。", "example2": "She bought a franchise and opened three locations in two years.", "example2_zh": "她購買了加盟權，兩年內開了三家分店。", "pos": "名詞／動詞"}, {"word": "negotiate", "ipa": "/nɪˈɡoʊʃieɪt/", "phonetic": "nuh-GO-shee-ayt", "zh": "談判；協商", "category": "會議", "example": "We will negotiate the contract terms next week.", "example_zh": "我們下週將協商合約條款。", "example2": "Our goal is to negotiate better payment terms with the vendor.", "example2_zh": "我們的目標是與供應商談判更好的付款條件。", "pos": "動詞"}, {"word": "cash flow", "ipa": "/ˈkæʃ floʊ/", "phonetic": "KASH floh", "zh": "現金流", "category": "財經", "example": "Positive cash flow is vital for business survival.", "example_zh": "正向現金流對企業生存至關重要。", "example2": "Startups often fail due to poor cash flow management, not lack of profit.", "example2_zh": "新創公司失敗通常是因為現金流管理不善，而非缺乏利潤。", "pos": "名詞片語"}, {"word": "sustainable", "ipa": "/səˈsteɪnəbəl/", "phonetic": "suh-STAY-nuh-bul", "zh": "可持續的；永續的", "category": "生活", "example": "The company is committed to sustainable business practices.", "example_zh": "公司致力於可持續的商業實踐。", "example2": "Long-term success requires building a sustainable business model.", "example2_zh": "長期成功需要建立可持續的商業模式。", "pos": "形容詞"}, {"word": "hedge fund", "ipa": "/ˈhɛdʒ fʌnd/", "phonetic": "HEJ fund", "zh": "對沖基金", "category": "財經", "example": "Hedge funds often use complex strategies to generate returns.", "example_zh": "對沖基金常使用複雜策略來產生回報。", "example2": "The hedge fund posted a 30% return even during the market downturn.", "example2_zh": "即使在市場低迷期間，對沖基金也錄得30%的回報。", "pos": "名詞片語"}, {"word": "diversification", "ipa": "/daɪˌvɜːrsɪfɪˈkeɪʃən/", "phonetic": "dy-vur-suh-fuh-KAY-shun", "zh": "多元化；分散投資", "category": "財經", "example": "Portfolio diversification reduces investment risk.", "example_zh": "投資組合多元化可降低投資風險。", "example2": "Geographic diversification protects the portfolio from local downturns.", "example2_zh": "地域多元化可保護投資組合免受當地經濟下滑的影響。", "pos": "名詞"}, {"word": "debrief", "ipa": "/diːˈbriːf/", "phonetic": "dee-BREEF", "zh": "彙報；事後討論", "category": "會議", "example": "Let's debrief after the client presentation.", "example_zh": "客戶簡報後我們來做個彙報。", "example2": "After the product launch, the team gathered to debrief.", "example2_zh": "產品發布後，團隊聚在一起做事後彙報。", "pos": "動詞／名詞"}, {"word": "venture", "ipa": "/ˈvɛntʃər/", "phonetic": "VEN-cher", "zh": "冒險；合資企業", "category": "商業", "example": "They launched a joint venture with a European partner.", "example_zh": "他們與一家歐洲合作夥伴成立了合資企業。", "example2": "The venture proved profitable within 18 months of launch.", "example2_zh": "這項合資企業在啟動後18個月內就實現了盈利。", "pos": "名詞／動詞"}, {"word": "outsource", "ipa": "/ˈaʊtsɔːrs/", "phonetic": "OWT-sors", "zh": "外包", "category": "商業", "example": "Many companies outsource IT support to reduce costs.", "example_zh": "許多公司將IT支援外包以降低成本。", "example2": "We plan to outsource logistics to reduce operational costs.", "example2_zh": "我們計劃外包物流以降低營運成本。", "pos": "動詞"}, {"word": "arbitrage", "ipa": "/ˈɑːrbɪtrɑːʒ/", "phonetic": "AR-buh-trazh", "zh": "套利；仲裁", "category": "財經", "example": "Traders use arbitrage to profit from price differences.", "example_zh": "交易員利用套利從價格差異中獲利。", "example2": "Cryptocurrency arbitrage requires fast execution and low fees.", "example2_zh": "加密貨幣套利需要快速執行和低費用。", "pos": "名詞／動詞"}, {"word": "follow-up", "ipa": "/ˈfɒloʊˌʌp/", "phonetic": "FOL-oh-up", "zh": "後續跟進；追蹤", "category": "會議", "example": "I will send a follow-up email after the meeting.", "example_zh": "會後我會發送一封跟進郵件。", "example2": "A follow-up call was scheduled for the following Tuesday.", "example2_zh": "後續通話安排在下週二。", "pos": "名詞／形容詞"}, {"word": "moderator", "ipa": "/ˈmɒdəreɪtər/", "phonetic": "MOD-uh-ray-ter", "zh": "主持人；協調人", "category": "會議", "example": "The moderator kept the discussion on track.", "example_zh": "主持人讓討論保持在正確方向。", "example2": "The moderator skillfully managed the Q&A session.", "example2_zh": "主持人熟練地掌控了問答環節。", "pos": "名詞"}, {"word": "punctual", "ipa": "/ˈpʌŋktʃuəl/", "phonetic": "PUNK-choo-ul", "zh": "準時的", "category": "生活", "example": "Being punctual shows respect for others' time.", "example_zh": "準時表現了對他人時間的尊重。", "example2": "Punctual employees signal professionalism and respect for others.", "example2_zh": "準時的員工傳達出專業精神和對他人的尊重。", "pos": "形容詞"}, {"word": "automation", "ipa": "/ˌɔːtəˈmeɪʃən/", "phonetic": "aw-tuh-MAY-shun", "zh": "自動化", "category": "科技", "example": "Automation has transformed manufacturing processes worldwide.", "example_zh": "自動化改變了全球的製造流程。", "example2": "Process automation reduced manual errors by over 60%.", "example2_zh": "流程自動化將手動錯誤減少了60%以上。", "pos": "名詞"}, {"word": "minutes", "ipa": "/ˈmɪnɪts/", "phonetic": "MIN-its", "zh": "會議記錄", "category": "會議", "example": "Who will take the minutes during today's meeting?", "example_zh": "今天的會議記錄由誰負責？", "example2": "The minutes confirmed that the budget proposal was approved.", "example2_zh": "會議記錄確認預算提案已獲批准。", "pos": "名詞"}, {"word": "prototype", "ipa": "/ˈproʊtətaɪp/", "phonetic": "PRO-tuh-typ", "zh": "原型；雛形", "category": "科技", "example": "We built a prototype to test the concept with users.", "example_zh": "我們建立了原型來與用戶測試概念。", "example2": "The engineering team built three prototypes before settling on a design.", "example2_zh": "工程團隊在確定設計前製作了三個原型。", "pos": "名詞／動詞"}, {"word": "deployment", "ipa": "/dɪˈplɔɪmənt/", "phonetic": "duh-PLOY-ment", "zh": "部署；發布", "category": "科技", "example": "The deployment of the new system was completed overnight.", "example_zh": "新系統的部署在一夜之間完成。", "example2": "Automated deployment pipelines reduce human error significantly.", "example2_zh": "自動化部署流程大幅減少了人為錯誤。", "pos": "名詞"}, {"word": "audit", "ipa": "/ˈɔːdɪt/", "phonetic": "AW-dit", "zh": "審計；查帳", "category": "財經", "example": "An external auditor conducts the annual financial audit.", "example_zh": "外部審計師進行年度財務審計。", "example2": "The annual audit revealed no material discrepancies in the accounts.", "example2_zh": "年度審計未發現帳目中有任何重大差異。", "pos": "名詞／動詞"}, {"word": "transparent", "ipa": "/trænsˈpærənt/", "phonetic": "trans-PAIR-unt", "zh": "透明的；坦誠的", "category": "生活", "example": "Leaders should be transparent about company challenges.", "example_zh": "領導者應該對公司挑戰保持透明。", "example2": "We believe in being transparent about our pricing and policies.", "example2_zh": "我們相信對定價和政策保持透明。", "pos": "形容詞"}, {"word": "agile", "ipa": "/ˈædʒaɪl/", "phonetic": "AJ-ul", "zh": "敏捷的；靈活的（開發方法）", "category": "科技", "example": "The team uses agile methodology for software development.", "example_zh": "團隊使用敏捷方法論進行軟體開發。", "example2": "Adopting agile practices helped the team ship features faster.", "example2_zh": "採用敏捷實踐幫助團隊更快地發布功能。", "pos": "形容詞"}, {"word": "mentor", "ipa": "/ˈmɛntɔːr/", "phonetic": "MEN-tor", "zh": "導師；指導者", "category": "生活", "example": "Having a mentor can accelerate your career growth.", "example_zh": "有一位導師可以加速你的職業發展。", "example2": "She mentored three junior employees who all received promotions.", "example2_zh": "她指導了三位初級員工，他們都獲得了晉升。", "pos": "名詞／動詞"}], "grammar": [{"title": "表示讓步：Even though / Despite", "category": "連接詞", "rule": "Even though 後接完整子句；despite 後接名詞或動名詞。都表示「雖然…但還是…」。", "pattern": "Even though [子句], [主句]. / Despite [名詞/V-ing], [主句].", "examples": [{"en": "Even though the budget was tight, we completed the project on time.", "zh": "儘管預算緊張，我們還是按時完成了專案。"}, {"en": "Despite the economic slowdown, our sales remained strong.", "zh": "儘管經濟放緩，我們的銷售額仍然強勁。"}, {"en": "Even though she had no prior experience, she performed exceptionally well.", "zh": "儘管她沒有相關經驗，但表現非常出色。"}], "wrong": "Despite the budget was tight, we completed the project.", "right": "Despite the tight budget, we completed the project.", "tip": "Despite 後接名詞，不接子句。要接子句用 Even though / Although。"}, {"title": "表示補充：In addition / Furthermore", "category": "連接詞", "rule": "表示「另外、此外」，用來補充前面說的內容，使論點更強。", "pattern": "In addition, [補充內容]. / Furthermore, [更進一步的內容].", "examples": [{"en": "The new system reduces costs. In addition, it improves efficiency.", "zh": "新系統降低了成本。此外，它還提高了效率。"}, {"en": "We need to improve quality. Furthermore, we must reduce delivery time.", "zh": "我們需要提高品質。而且，我們還必須縮短交貨時間。"}, {"en": "The candidate has relevant experience. In addition, she speaks three languages.", "zh": "該候選人有相關經驗。此外，她會說三種語言。"}], "wrong": "In addition we need to improve quality.", "right": "In addition, we need to improve quality.", "tip": "In addition 和 Furthermore 後面一定要加逗號。"}, {"title": "第二條件句 — 假設情況", "category": "條件句", "rule": "If + 過去式, would + 動詞原形。用於假設或不太可能的情況。", "pattern": "If we [過去式], we would [動詞原形].", "examples": [{"en": "If we had more resources, we would launch the product sooner.", "zh": "如果我們有更多資源，我們會更早推出產品。"}, {"en": "If I were in your position, I would negotiate the terms.", "zh": "如果我在您的立場，我會談判條款。"}, {"en": "If we reduced headcount, it would impact productivity.", "zh": "如果我們裁員，將會影響生產力。"}], "wrong": "If we would have more resources, we would launch sooner.", "right": "If we had more resources, we would launch sooner.", "tip": "if 子句用過去式（be 動詞用 were，不用 was），主句用 would。"}, {"title": "第三條件句 — 假設過去不同的結果", "category": "條件句", "rule": "If + had + 過去分詞, would have + 過去分詞。討論過去「如果當時不同」的假設結果。", "pattern": "If we had [過去分詞], we would have [過去分詞].", "examples": [{"en": "If we had invested earlier, we would have made a larger profit.", "zh": "如果我們早點投資，就會獲得更大的利潤。"}, {"en": "If they had checked the data, they would have found the error.", "zh": "如果他們核查了資料，就會發現錯誤。"}, {"en": "If I had known about the meeting, I would have attended.", "zh": "如果我知道有這個會議，我就會參加了。"}], "wrong": "If we invested earlier, we would make larger profit.", "right": "If we had invested earlier, we would have made a larger profit.", "tip": "第三條件：if 子句用 had+過去分詞，主句用 would have+過去分詞。"}]}, "2026-06-28": {"words": [{"word": "liquidity", "ipa": "/lɪˈkwɪdɪti/", "phonetic": "luh-KWID-uh-tee", "zh": "流動性；變現能力", "category": "財經", "example": "High liquidity means assets can be quickly converted to cash.", "example_zh": "高流動性意味著資產可以快速轉換為現金。", "example2": "During the crisis, even well-performing assets faced liquidity problems.", "example2_zh": "危機期間，即使表現良好的資產也面臨流動性問題。", "pos": "名詞"}, {"word": "algorithm", "ipa": "/ˈælɡərɪðəm/", "phonetic": "AL-guh-rith-um", "zh": "演算法", "category": "科技", "example": "The algorithm recommends products based on your history.", "example_zh": "演算法根據您的歷史記錄推薦產品。", "example2": "Machine learning algorithms improve with more training data.", "example2_zh": "機器學習演算法隨著更多訓練資料而改善。", "pos": "名詞"}, {"word": "empathy", "ipa": "/ˈɛmpəθi/", "phonetic": "EM-puh-thee", "zh": "同理心；設身處地", "category": "生活", "example": "Empathy is a key skill for effective leadership.", "example_zh": "同理心是有效領導的關鍵技能。", "example2": "Managers who show empathy build stronger, more loyal teams.", "example2_zh": "展現同理心的管理者建立更強大、更忠誠的團隊。", "pos": "名詞"}, {"word": "facilitate", "ipa": "/fəˈsɪlɪteɪt/", "phonetic": "fuh-SIL-uh-tayt", "zh": "促進；主持（會議）", "category": "會議", "example": "She was asked to facilitate the workshop.", "example_zh": "她被要求主持這場工作坊。", "example2": "Good leaders facilitate discussions rather than dominate them.", "example2_zh": "好的領導者是促進討論，而不是主導討論。", "pos": "動詞"}, {"word": "quorum", "ipa": "/ˈkwɔːrəm/", "phonetic": "KWOR-um", "zh": "法定人數", "category": "會議", "example": "We cannot vote until we have a quorum.", "example_zh": "在達到法定人數之前我們無法投票。", "example2": "We finally reached a quorum after two members joined online.", "example2_zh": "兩位成員線上加入後，我們終於達到了法定人數。", "pos": "名詞"}, {"word": "incentive", "ipa": "/ɪnˈsɛntɪv/", "phonetic": "in-SEN-tiv", "zh": "激勵；獎勵", "category": "商業", "example": "Performance bonuses are a great incentive for employees.", "example_zh": "績效獎金是員工的絕佳激勵。", "example2": "Stock options serve as a long-term incentive for key employees.", "example2_zh": "股票期權作為關鍵員工的長期激勵。", "pos": "名詞"}, {"word": "fiscal", "ipa": "/ˈfɪskəl/", "phonetic": "FIS-kul", "zh": "財政的；會計年度的", "category": "財經", "example": "The fiscal year ends on December 31st.", "example_zh": "財政年度於12月31日結束。", "example2": "The fiscal year runs from April to March in Japan.", "example2_zh": "日本的財政年度從4月到3月。", "pos": "形容詞"}, {"word": "constructive", "ipa": "/kənˈstrʌktɪv/", "phonetic": "kun-STRUK-tiv", "zh": "建設性的", "category": "生活", "example": "Please provide constructive feedback on the report.", "example_zh": "請對報告提供建設性的回饋。", "example2": "Even negative feedback can be helpful if it is constructive.", "example2_zh": "即使是負面的回饋，只要具有建設性就是有幫助的。", "pos": "形容詞"}, {"word": "acquisition", "ipa": "/ˌækwɪˈzɪʃən/", "phonetic": "ak-wih-ZIH-shun", "zh": "收購；購買", "category": "商業", "example": "The company announced the acquisition of a startup.", "example_zh": "公司宣布收購一家新創公司。", "example2": "The acquisition is expected to close in the third quarter.", "example2_zh": "此次收購預計在第三季完成。", "pos": "名詞"}, {"word": "escalate", "ipa": "/ˈɛskəleɪt/", "phonetic": "ES-kuh-layt", "zh": "升級；呈報上級", "category": "會議", "example": "Please escalate this issue to your manager immediately.", "example_zh": "請立即將此問題呈報給你的主管 xceed our target.", "right": "If we close this deal, we will exceed our target.", "tip": "if 子句用現在式，不用 will（這是最常見的錯誤！）"}, {"title": "Must vs. Have to — 強制與義務", "category": "情態動詞", "rule": "must = 說話者認為必須（主觀）；have to = 外部規定必須（客觀）。", "pattern": "We must [動詞] / We have to [動詞]", "examples": [{"en": "We must deliver this project on time — it's non-negotiable.", "zh": "我們必須準時交付這個專案——這是不可協商的。"}, {"en": "All employees have to complete the compliance training.", "zh": "所有員工都必須完成合規培訓。"}, {"en": "You must not share confidential information externally.", "zh": "您絕對不能對外分享機密信息。"}], "wrong": "We must to deliver this project on time.", "right": "We must deliver this project on time.", "tip": "must 和 have to 後面都接動詞原形，不加 to。"}, {"title": "常用介系詞搭配（商務）", "category": "介系詞", "rule": "英文動詞+介系詞的固定搭配，必須整組記憶，不能用中文邏輯翻譯。", "pattern": "[動詞] + [固定介系詞]", "examples": [{"en": "I am responsible for managing the project timeline.", "zh": "我負責管理專案時間表。（responsible for）"}, {"en": "We need to focus on the key deliverables this week.", "zh": "本週我們需要專注於關鍵交付成果。（focus on）"}, {"en": "This plan depends on the budget approval.", "zh": "這個計畫取決於預算批准。（depend on）"}], "wrong": "I am responsible of managing the project.", "right": "I am responsible for managing the project.", "tip": "responsible for / focus on / depend on / agree with / result in — 這些固定搭配要整組背。"}, {"title": "Should — 建議與責任", "category": "情態動詞", "rule": "表示應該做某事（建議、義務）。比 must 柔和，比 could 更明確。", "pattern": "We should [動詞原形] / You should consider [V-ing]", "examples": [{"en": "We should review the budget before the Q3 planning.", "zh": "我們應該在Q3規劃前審查預算。"}, {"en": "You should consider the risks before making a decision.", "zh": "您應該在做決定前考慮風險。"}, {"en": "This issue should be escalated to management.", "zh": "這個問題應該呈報給管理層。"}], "wrong": "We should to review the budget.", "right": "We should review the budget.", "tip": "情態動詞後面直接接動詞原形，不加 to。"}]}, "2026-07-06": {"words": [{"word": "valuation", "ipa": "/ˌvæljuˈeɪʃən/", "phonetic": "val-yoo-AY-shun", "zh": "估值；評估"  "Adopting agile practices helped the team ship features faster.", "example2_zh": "採用敏捷實踐幫助團隊更快地發布功能。", "pos": "形容詞"}, {"word": "portfolio", "ipa": "/pɔːrtˈfoʊlioʊ/", "phonetic": "port-FOH-lee-oh", "zh": "投資組合；作品集", "category": "財經", "example": "A balanced portfolio includes stocks, bonds, and real estate.", "example_zh": "均衡的投資組合包括股票、債券和房地產。", "example2": "Rebalancing your portfolio quarterly helps maintain your target allocation.", "example2_zh": "每季重新平衡投資組合有助於維持目標配置。", "pos": "名詞"}, {"word": "overhead", "ipa": "/ˈoʊvərˌhɛd/", "phonetic": "OH-ver-hed", "zh": "管銷費用；間接成本", "category": "商業", "example": "Reducing overhead costs is essential for profitability.", "example_zh": "降低管銷費用對盈利能力至關重要。", "example2": "Automating routine tasks helped cut overhead by 25%.", "example2_zh": "自動化例行任務幫助降低了25%的管銷費用。", "pos": "名詞"}, {"word": "moderator", "ipa": "/ˈmɒdəreɪtər/", "phonetic": "MOD-uh-ray-ter", "zh": "主持人；協調人", "category": "會議", "example": "The moderator kept the discussion on track.", "example_zh": "主持人讓討論保持在正確方向。", "example2": "The moderator skillfully managed the Q&A session.", "example2_zh": "主持人熟練地掌控了問答環節。", "pos": "名詞"}, {"word": "leverage", "ipa": "/ˈlɛvərɪdʒ/", "phonetic": "LEV-er-ij", "zh": "槓桿；善用資源", "category": "商業", "example": "We can leverage our existing network to enter new markets.", "example_zh": "我們可以利用現有網絡進入新市場。", "example2": "Small companies can leverage technology to compete with larger rivals.", "example2_zh": "小公司可以利用科技與大型競爭對手競爭。", "pos": "名詞／動詞"}, {"word": "latency", "ipa": "/ˈleɪtənsi/", "phonetic": "LAY-ten-see", "zh": "延遲時間", "category": "科技", "example": "Low latency is essential for real-time gaming applications.", "example_zh": "低延遲對於即時遊戲應用至關重要。", "example2": "High latency is causing complaints from users in remote regions.", "example2_zh": "高延遲導致偏遠地區的用戶投訴。", "pos": "名詞"}, {"word": "assertive", "ipa": "/əˈsɜːrtɪv/", "phonetic": "uh-SUR-tiv", "zh": "果斷的；自信表達的", "category": "生活", "example": "Being assertive helps you communicate your needs clearly.", "example_zh": "果斷有助於你清楚地溝通自己的需求。", "example2": "Be assertive when negotiating; know what you want and ask for it.", "example2_zh": "談判時要果斷；清楚自己想要什麼並直接提出。", "pos": "形容詞"}], "grammar": [{"title": "確認理解：If I understand correctly...", "category": "澄清確認", "rule": "重述對方的意思以確認自己理解正確，商務溝通中避免誤解的關鍵技巧。", "pattern": "If I understand correctly, [重述]. / So what you're saying is [重述]?", "examples": [{"en": "If I understand correctly, you want to delay the project by two weeks?", "zh": "如果我理解正確，您想將專案延遲兩週？"}, {"en": "So what you're saying is that the budget needs to be approved first?", "zh": "所以您的意思是預算需要先獲得批准？"}, {"en": "Let me confirm — you need the report by Monday morning, correct?", "zh": "讓我確認一下——您需要在週一早上前收到報告，對嗎？"}], "wrong": "You mean delay two weeks?", "right": "If I understand correctly, you want to delay the project by two weeks?", "tip": "用完整句型重述，讓對方確認，可以避免很多誤解。"}, {"title": "提出建議：I suggest / I recommend", "category": "表達意見", "rule": "正式提出建議的句型。suggest/recommend 後面接 V-ing 或 that 子句。", "pattern": "I suggest [V-ing] / I recommend [V-ing] / I suggest that we [動詞原形]", "examples": [{"en": "I suggest scheduling a follow-up meeting next week.", "zh": "我建議安排下週的後續會議。"}, {"en": "I recommend reviewing the contract before signing.", "zh": "我建議在簽署前審查合約。"}, {"en": "I suggest that we postpone the launch until Q2.", "zh": "我建議我們將發布推遲到第二季。"}], "wrong": "I suggest to schedule a follow-up meeting.", "right": "I suggest scheduling a follow-up meeting.", "tip": "suggest 後面接 V-ing，不接 to V！（recommend 也一樣）"}, {"title": "動名詞 vs. 不定式 — 常見動詞", "category": "句型結構", "rule": "有些動詞後接 V-ing（動名詞），有些接 to V（不定式），意思可能不同。", "pattern": "[動詞] + V-ing 或 [動詞] + to V", "examples": [{"en": "I recommend starting the project next week. (recommend + V-ing)", "zh": "我建議下週開始這個專案。"}, {"en": "We decided to postpone the launch. (decide + to V)", "zh": "我們決定推遲發布。"}, {"en": "Please avoid scheduling meetings on Friday afternoon. (avoid + V-ing)", "zh": "請避免在週五下午安排會議。"}], "wrong": "I recommend to start the project.", "right": "I recommend starting the project.", "tip": "接 V-ing：suggest, recommend, avoid, consider, finish。接 to V：decide, plan, agree, need, want。"}, {"title": "第一條件句 — 可能發生的情況", "category": "條件句", "rule": "If + 現在式, will/can + 動詞原形。用於討論可能發生的結果。", "pattern": "If we [現在式動詞], we will [動詞原形].", "examples": [{"en": "If we close this deal, we will exceed our quarterly target.", "zh": "如果我們完成這筆交易，我們將超過季度目標。"}, {"en": "If the budget is approved, we can start next month.", "zh": "如果預算獲批，我們可以下個月開始。"}, {"en": "If you have any concerns, please raise them now.", "zh": "如果您有任何顧慮，請現在提出。"}], "wrong": "If we will close this deal, we will exceed our target.", "right": "If we close this deal, we will exceed our target.", "tip": "if 子句用現在式，不用 will（這是最常見的錯誤！）"}]}, "2026-07-07": {"words": [{"word": "merger", "ipa": "/ˈmɜːrdʒər/", "phonetic": "MUR-jer", "zh": "合併", "category": "商業", "example": "The merger created the largest company in the sector.", "example_zh": "這次合併創造了該行業最大的公司。", "example2": "The merger resulted in significant cost savings for both parties.", "example2_zh": "合併為雙方帶來了顯著的成本節省。", "pos": "名詞"}, {"word": "mentor", "ipa": "/ˈmɛntɔːr/", "phonetic": "MEN-tor", "zh": "導師；指導者", "category": "生活", "example": "Having a mentor can accelerate your career growth.", "example_zh": "有一位導師可以加速你的職業發展。", "example2": "She mentored three junior employees who all received promotions.", "example2_zh": "她指導了三位初級員工，他們都獲得了晉升。", "pos": "名詞／動詞"}, {"word": "cybersecurity", "ipa": "/ˌsaɪbərsɪˈkjʊərɪti/", "phonetic": "SY-ber-sih-KYOOR-uh-tee", "zh": "網路安全", "category": "科技", "example": "Investing in cybersecurity is critical for every business.", "example_zh": "投資網路安全對每個企業都至關重要。", "example2": "Cybersecurity threats are becoming more sophisticated each year.", "example2_zh": "每年網路安全威脅變得越來越複雜。", "pos": "名詞"}, {"word": "machine learning", "ipa": "/məˈʃiːn ˈlɜːrnɪŋ/", "phonetic": "muh-SHEEN LUR-ning", "zh": "機器學習", "category": "科技", "example": "Machine learning enables computers to learn from data.", "example_ d deployment pipelines reduce human error significantly.", "example2_zh": "自動化部署流程大幅減少了人為錯誤。", "pos": "名詞"}, {"word": "return on investment", "ipa": "/rɪˈtɜːrn ɒn ɪnˈvɛstmənt/", "phonetic": "ruh-TURN on in-VEST-ment", "zh": "投資報酬率（ROI）", "category": "財經", "example": "This marketing campaign had an excellent return on investment.", "example_zh": "這次行銷活動有出色的投資報酬率。", "example2": "Calculating return on investment helps prioritize spending decisions.", "example2_zh": "計算投資報酬率有助於確定支出決策的優先順序。", "pos": "名詞片語"}, {"word": "procurement", "ipa": "/prəˈkjʊərmənt/", "phonetic": "pruh-KYOOR-ment", "zh": "採購", "category": "商業", "example": "The procurement team negotiated better prices with suppliers.", "example_zh": "採購團隊與供應商談判了更好的價格。", "example2": "The procurement department is evaluating three new suppliers.", "example2_zh": "採購部門正在評估三家新供應商。", "pos": "名詞"}, {"word": "leverage", "ipa": "/ˈlɛvərɪdʒ/", "phonetic": "LEV-er-ij", "zh": "槓桿；善用資源", "category": "商業", "example": "We can leverage our existing network to enter new markets.", "example_zh": "我們可以利用現有網絡進入新市場。", "example2": "Small companies can leverage technology to compete with larger rivals.", "example2_zh": "小公司可以利用科技與大型競爭對手競爭。", "pos": "名詞／動詞"}, {"word": "unanimous", "ipa": "/juːˈnænɪməs/", "phonetic": "yoo-NAN-uh-mus", "zh": "全體一致的", "category": "會議", "example": "The vote was unanimous in favor of the proposal.", "example_zh": "投票結果全體一致支持該提案。", "example2": "Board members were unanimous in rejecting the proposal.", "example2_zh": "董事會成員一致反對該提案。", "pos": "形容詞"}, {"word": "blockchain", "ipa": "/ˈblɒktʃeɪn/", "phonetic": "BLOK-chayn", "zh": "區塊鏈", "category": "科技", "example": "Blockchain technology ensures transparent and secure transactions.", "example_zh": "區塊鏈技術確保交易透明且安全。", "example2": "The supply chain team is exploring blockchain for better traceability.", "example2_zh": "供應鏈團隊正在探索區塊鏈以提升可追溯性。", "pos": "名詞"}, {"word": "minutes", "ipa": "/ˈmɪnɪts/", "phonetic": "MIN-its", "zh": "會議記錄", "category": "會議", "example": "Who will orm", "ipa": "/ˈbreɪnstɔːrm/", "phonetic": "BRAYN-storm", "zh": "腦力激盪；集思廣益", "category": "會議", "example": "Let's brainstorm ideas for the new product launch.", "example_zh": "我們來腦力激盪新產品上市的點子。", "example2": "Let's brainstorm ways to improve the onboarding process.", "example2_zh": "我們來集思廣益，改善新員工入職流程。", "pos": "動詞／名詞"}, {"word": "resolution", "ipa": "/ˌrɛzəˈluːʃən/", "phonetic": "rez-uh-LOO-shun", "zh": "決議；解決方案", "category": "會議", "example": "The board passed a resolution to expand overseas.", "example_zh": "董事會通過了海外擴張的決議。", "example2": "The resolution was adopted with a majority vote.", "example2_zh": "該決議以多數票通過。", "pos": "名詞"}, {"word": "acquisition", "ipa": "/ˌækwɪˈzɪʃən/", "phonetic": "ak-wih-ZIH-shun", "zh": "收購；購買", "category": "商業", "example": "The company announced the acquisition of a startup.", "example_zh": "公司宣布收購一家新創公司。", "example2": "The acquisition is expected to close in the third quarter.", "example2_zh": "此次收購預計在第三季完成。", "pos": "名詞"}, {"word": "automation", "ipa": "/ˌɔːtəˈmeɪʃən/", "phonetic": "aw-tuh-MAY-shun", "zh": "自動化", "category": "科技", "example": "Automation has transformed manufacturing processes worldwide.", "example_zh": "自動化改變了全球的製造流程。", "example2": "Process automation reduced manual errors by over 60%.", "example2_zh": "流程自動化將手動錯誤減少了60%以上。", "pos": "名詞"}, {"word": "minutes", "ipa": "/ˈmɪnɪts/", "phonetic": "MIN-its", "zh": "會議記錄", "category": "會議", "example": "Who will take the minutes during today's meeting?", "example_zh": "今天的會議記錄由誰負責？", "example2": "The minutes confirmed that the budget proposal was approved.", "example2_zh": "會議記錄確認預算提案已獲批准。", "pos": "名詞"}, {"word": "negotiate", "ipa": "/nɪˈɡoʊʃieɪt/", "phonetic": "nuh-GO-shee-ayt", "zh": "談判；協商", "category": "會議", "example": "We will negotiate the contract terms next week.", "example_zh": "我們下週將協商合約條款。", "example2": "Our goal is to negotiate better payment terms with the vendor.", "example2_zh": "我們的目標是與供應商談判更好的付款條件。", "pos": "動詞"}, {"word": "cybersecurity", "ipa": "/ˌsaɪbərsɪˈkjʊə
