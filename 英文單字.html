pe.", "example_zh": "完成原型機是我們達到的重要里程碑。", "example2": "Signing the first overseas client was a major milestone for us.", "example2_zh": "簽下第一個海外客戶是我們的重要里程碑。", "pos": "名詞"}, {"word": "depreciation", "ipa": "/dɪˌpriːʃɪˈeɪʃən/", "phonetic": "duh-pree-shee-AY-shun", "zh": "折舊；貶值", "category": "財經", "example": "Equipment depreciation reduces taxable income.", "example_zh": "設備折舊可減少應稅收入。", "example2": "Machinery depreciation is recorded as an expense each year.", "example2_zh": "機械折舊每年記錄為一項費用。", "pos": "名詞"}, {"word": "minutes", "ipa": "/ˈmɪnɪts/", "phonetic": "MIN-its", "zh": "會議記錄", "category": "會議", "example": "Who will take the minutes during today's meeting?", "example_zh": "今天的會議記錄由誰負責？", "example2": "The minutes confirmed that the budget proposal was approved.", "example2_zh": "會議記錄確認預算提案已獲批准。", "pos": "名詞"}, {"word": "optimization", "ipa": "/ˌɒptɪmaɪˈzeɪʃən/", "phonetic": "op-tuh-my-ZAY-shun", "zh": "優化", "category": "科技", "example": "Search engine optimization improves your website ranking.", "example_zh": "搜尋引擎優化提升您的網站排名。", "example2": "Database optimization reduced our page load time by 40%.", "example2_zh": "資料庫優化將我們的頁面載入時間縮短了40%。", "pos": "名詞"}, {"word": "repository", "ipa": "/rɪˈpɒzɪtɔːri/", "phonetic": "ruh-POZ-uh-tor-ee", "zh": "程式庫；儲存庫", "category": "科技", "example": "All code is stored in the GitHub repository.", "example_zh": "所有程式碼都儲存在GitHub儲存庫中。", "example2": "Please push your changes to the main repository before 6 PM.", "example2_zh": "請在下午6點前將您的更改推送到主儲存庫。", "pos": "名詞"}, {"word": "unanimous", "ipa": "/juːˈnænɪməs/", "phonetic": "yoo-NAN-uh-mus", "zh": "全體一致的", "category": "會議", "example": "The vote was unanimous in favor of the proposal.", "example_zh": "投票結果全體一致支持該提案。", "example2": "Board members were unanimous in rejecting the proposal.", "example2_zh": "董事會成員一致反對該提案。", "pos": "形容詞"}, {"word": "liquidity", "ipa": "/lɪˈkwɪdɪti/", "phonetic": "luh-KWID-uh-tee", "zh": "流動性；變現能力", "category": "財經", "example": "High liquidity means assets can be quickly converted to cash.", "example_zh": "高流動性意味著資產可以快速轉換為現金。", "example2": "During the crisis, even well-performing assets faced liquidity problems.", "example2_zh": "危機期間，即使表現良好的資產也面臨流動性問題。", "pos": "名詞"}, {"word": "networking", "ipa": "/ˈnɛtwɜːrkɪŋ/", "phonetic": "NET-wur-king", "zh": "人脈建立；社交", "category": "生活", "example": "Networking events are great for meeting industry peers.", "example_zh": "社交活動非常適合結識行業同仁。", "example2": "Networking online can be as effective as meeting people in person.", "example2_zh": "線上建立人脈可以和面對面認識人一樣有效。", "pos": "名詞"}], "grammar": [{"title": "表示讓步：Even though / Despite", "category": "連接詞", "rule": "Even though 後接完整子句；despite 後接名詞或動名詞。都表示「雖然…但還是…」。", "pattern": "Even though [子句], [主句]. / Despite [名詞/V-ing], [主句].", "examples": [{"en": "Even though the budget was tight, we completed the project on time.", "zh": "儘管預算緊張，我們還是按時完成了專案。"}, {"en": "Despite the economic slowdown, our sales remained strong.", "zh": "儘管經濟放緩，我們的銷售額仍然強勁。"}, {"en": "Even though she had no prior experience, she performed exceptionally well.", "zh": "儘管她沒有相關經驗，但表現非常出色。"}], "wrong": "Despite the budget was tight, we completed the project.", "right": "Despite the tight budget, we completed the project.", "tip": "Despite 後接名詞，不接子句。要接子句用 Even though / Although。"}, {"title": "Might — 不確定的可能性", "category": "情態動詞", "rule": "表示不太確定的可能性（比 may 更不確定）。會議中表達不確定時使用。", "pattern": "We might [動詞] / This might [動詞]", "examples": [{"en": "We might need to revise our projections for Q4.", "zh": "我們可能需要修訂Q4的預測。"}, {"en": "This might affect our timeline significantly.", "zh": "這可能會顯著影響我們的時間表。"}, {"en": "The client might request additional changes.", "zh": "客戶可能會要求額外的修改。"}], "wrong": "We might to revise our projections.", "right": "We might need to revise our projections.", "tip": "might 後面也是動詞原形，不加 to。"}, {"title": "第三條件句 — 假設過去不同的結果", "category": "條件句", "rule": "If + had + 過去分詞, would have + 過去分詞。討論過去「如果當時不同」的假設結果。", "pattern": "If we had [過去分詞], we would have [過去分詞].", "examples": [{"en": "If we had invested earlier, we would have made a larger profit.", "zh": "如果我們早點投資，就會獲得更大的利潤。"}, {"en": "If they had checked the data, they would have found the error.", "zh": "如果他們核查了資料，就會發現錯誤。"}, {"en": "If I had known about the meeting, I would have attended.", "zh": "如果我知道有這個會議，我就會參加了。"}], "wrong": "If we invested earlier, we would make larger profit.", "right": "If we had invested earlier, we would have made a larger profit.", "tip": "第三條件：if 子句用 had+過去分詞，主句用 would have+過去分詞。"}, {"title": "被動語態 — 商務報告常用", "category": "被動語態", "rule": "be + 過去分詞。強調動作的對象而非執行者，商務書信和報告很常見。", "pattern": "[主詞] + is/was/will be + [過去分詞] (+ by [執行者])", "examples": [{"en": "The proposal was approved by the board last week.", "zh": "提案上週獲得董事會批准。"}, {"en": "The meeting has been rescheduled to Thursday.", "zh": "會議已改期至週四。"}, {"en": "All contracts must be reviewed by the legal team.", "zh": "所有合約必須由法務團隊審查。"}], "wrong": "The proposal was approve by the board.", "right": "The proposal was approved by the board.", "tip": "被動語態一定是 be + 過去分詞（approved、reviewed 等）。"}]}, "2026-07-24": {"words": [{"word": "acquisition", "ipa": "/ˌækwɪˈzɪʃən/", "phonetic": "ak-wih-ZIH-shun", "zh": "收購；購買", "category": "商業", "example": "The company announced the acquisition of a startup.", "example_zh": "公司宣布收購一家新創公司。", "example2": "The acquisition is expected to close in the third quarter.", "example2_zh": "此次收購預計在第三季完成。", "pos": "名詞"}, {"word": "incentive", "ipa": "/ɪnˈsɛntɪv/", "phonetic": "in-SEN-tiv", "zh": "激勵；獎勵", "category": "商業", "example": "Performance bonuses are a great incentive for employees.", "example_zh": "績效獎金是員工的絕佳激勵。", "example2": "Stock options serve as a long-term incentive for key employees.", "example2_zh": "股票期權作為關鍵員工的長期激勵。", "pos": "名詞"}, {"word": "debrief", "ipa": "/diːˈbriːf/", "phonetic": "dee-BREEF", "zh": "彙報；事後討論", "category": "會議", "example": "Let's debrief after the client presentation.", "example_zh": "客戶簡報後我們來做個彙報。", "example2": "After the product launch, the team gathered to debrief.", // ── 篩選 ─────────────────────────────────────────────────────
function fmtDate(iso){
  const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso||"");
  if(!m) return iso;
  const d=new Date(+m[1],+m[2]-1,+m[3]),w=["日","一","二","三","四","五","六"];
  return `${m[2]}/${m[3]} 週${w[d.getDay()]}`;
}
function buildCatBar(){
  const all=filteredWords();
  const cnt={}; all.forEach(w=>{cnt[w.category]=(cnt[w.category]||0)+1;});
  document.getElementById("catBar").innerHTML=CATS.map(c=>{
    const n=c==="全部"?all.length:(cnt[c]||0);
    return `<button class="chip${c===curCat?" on":""}" onclick="setCat('${c}')">${c} <span style="opacity:.65;font-size:10px">${n}</span></button>`;
  }).join("");
}
function buildDateBar(){
  const btns=[{k:"全部",l:`全部（${ALL_DATES.length}天）`},...ALL_DATES.map(d=>({k:d,l:fmtDate(d)}))];
  document.getElementById("dateBar").innerHTML=btns.map(b=>
    `<button class="chip${b.k===curDate?" on":""}" onclick="setDate('${b.k}')">${b.l}</button>`
  ).join("");
}
function setCat(c){curCat=c;curIdx=0;stopPlay();buildCatBar();buildCards();updateProgress(0);}
function setDate(d){curDate=d;curIdx=0;stopPlay();buildDateBar();buildCards();updateProgress(0);}

function filteredWords(){
  const dates=curDate==="全部"?ALL_DATES:[curDate];
  let words=[];
  dates.forEach(d=>getWords(d).forEach(w=>words.push({...w,_date:d})));
  if(curCat!=="全部") words=words.filter(w=>w.category===curCat);
  return words;
}

// ── 進度 ─────────────────────────────────────────────────────
function updateProgress(idx){
  const total=filteredWords().length;
  const pct=total?Math.round((idx/total)*100):0;
  document.getElementById("progressBar").style.width=pct+"%";
  document.getElementById("progressText").textContent=`${Math.min(idx+1,total)} / ${total}`;
}

    test:/\bwould\b/i, hl:/\bwould\s+\w+/gi },

    warn:"注意：know, believe, want 等狀態動詞通常不用進行式。",
    test:/\b(is|are|am|were|was)\s+\w+ing\b/i, hl:/\b(is|are|am|were|was)\s+\w+ing\b/gi },
  { name:"動名詞 V-ing 作受詞", zh:"consider/recommend/suggest/avoid/finish 後面接 V-ing。",
    warn:"注意：這些動詞後面不能接 to V，只能接 V-ing。",
    test:/\b(consider|recommend|suggest|avoid|finish|keep|enjoy)\s+\w+ing\b/i,
    hl:/\b(consider|recommend|suggest|avoid|finish|keep|enjoy)\s+\w+ing\b/gi },
  { name:"比較級 more / -er than", zh:"比較兩者時使用。短形容詞加 -er，長形容詞加 more。",
    warn:"注意：不能同時用 more + -er（如『more bigger』是錯誤的）。",
    test:/\b(more|less|\w+er)\s+than\b/i, hl:/\b(more|less|\w+er)\s+than\b/gi },
  { name:"不定式 to + 動詞原形", zh:"表達目的、計畫或意圖。decide/plan/want/need 後面接 to V。",
    warn:"注意：suggest/recommend/avoid 後面接 V-ing，不接 to V。",
    test:/\bto\s+[a-z]{3,}\b/i, hl:/\bto\s+[a-z]{3,}\b/gi },
  ];
  for(const rule of GRAM_RULES){
    if(rule.test.test(sentence)){
      const highlighted = sentence.replace(rule.hl,
        m=>`<mark class="gram-hl">${m}</mark>`);
      return {name:rule.name, zh:rule.zh, warn:rule.warn, highlighted};
    }
  }
  return null;
}

// 發音重音分析：找到大寫音節
function parsePronunciation(phonetic, word){
  if(!phonetic) return null;
  const parts = phonetic.split('-');
  const stressIdx = parts.findIndex(p=>p===p.toUpperCase()&&p.length>0&&/[A-Z]/.test(p));
  if(stressIdx<0) return null;
  const markedPhonetic = parts.map((p,i)=>
    i===stressIdx?`<b>${p}</b>`:p).join('-');
  const total = parts.length;
  const ordinal = ['第一','第二','第三','第四'][stressIdx]||`第${stressIdx+1}`;
  // 中文使用者常見錯誤提示
  const commonMistakes = {
    '/θ/':'「th」聲音：舌頭輕咬上下牙，不是「s」或「t」',
    '/ð/':'「th」聲音：舌頭輕咬上下牙（有聲），不是「d」',
    '/æ/':'「a」短促音：嘴巴張大，比「ㄝ」更開',
    '/ʌ/':'「u」短音：類似「ㄚ」但更短，很多人讀成「oo」',
    '/r/':'英文「r」：嘴唇微圓，舌頭不捲，不要像注音「ㄖ」',
    '/v/':'「v」：上牙輕咬下唇摩擦，不是「b」或「w」',
    '/l/':'「l」結尾：舌頭要碰上牙齦收尾（如 call, full）',
  };
  let warnTip = '';
  for(const [sym,tip] of Object.entries(commonMistakes)){
    if((phonetic||'').includes(sym.replace(/\//g,''))){warnTip=tip;break;}
  }
  return {markedPhonetic, ordinal, total, warnTip};
}

// ── 建立單字卡片 ──────────────────────────────────────────────
function buildCards(){
  const feed=document.getElementById("feed");
  const words=filteredWords();
  buildCatBar();
  if(!words.length){feed.innerHTML=`<div class="empty-msg">此條件下無單字</div>`;return;}
  let html="",lastDate="";
  words.forEach((w,i)=>{
    if(curDate==="全部"&&w._date!==lastDate){
      lastDate=w._date;
      html+=`<div class="date-hdr">${fmtDate(w._date)} · ${getWords(w._date).length} 個單字</div>`;
    }
    const wEnc=encodeURIComponent(w.word);
    const eEnc=encodeURIComponent(w.example);

    // 文法分析
    const gram=analyzeGrammar(w.example);
    const gramHtml=gram?`
      <div class="gram-box">
        <div class="gram-title">📐 例句文法分析</div>
        <div class="gram-name">${gram.name}</div>
        <div class="gram-why">${gram.zh}</div>
        <div class="ex-en" style="margin:6px 0 6px"><span>${gram.highlighted}</span></div>
        <div class="gram-warn">⚠️ 常見錯誤：${gram.warn}</div>
      </div>`:'';

    // 發音分析
    const pron=parsePronunciation(w.phonetic,w.word);
    const pronHtml=pron?`
      <div class="pron-detail">
        <div class="pron-title">🎯 發音重點</div>

        ${pron.warnTip?`<div class="pron-warn">💡 中文使用者注意：${pron.warnTip}</div>`:''}
      </div>`:'';

    const e2Enc=w.example2?encodeURIComponent(w.example2):'';

    html+=`
    <div class="wcard" id="card-${i}">

      </div>
      <div class="word-row">

        <button class="icon-btn" onclick="sayWord(${i})" title="聆聽單字">🔊</button>
        <button class="icon-btn" onclick="saySpell(${i})" title="逐字母拼出" style="border:1.5px solid var(--border);border-radius:10px;padding:2px 7px;font-family:'Outfit';font-size:11px;font-weight:700;color:var(--muted);opacity:.7">A-B-C</button>
        <button class="icon-btn mic" data-enc="${wEnc}" data-rid="wr-${i}" onclick="startRec(this)">🎤 練習</button>
      </div>
      <div class="ipa">${w.ipa}</div>
      <div class="phonetic-pill">🗣 ${w.phonetic}</div>
      ${pronHtml}
      <div id="wr-${i}" class="rec-result"></div>
      <div class="meaning">${w.zh}</div>
      <div class="example-section">
        <div class="ex-label">例句 1</div>
        <div class="ex-en">
          <button class="icon-btn" style="font-size:14px;flex:0 0 auto" onclick="sayExample(${i},1)">🔊</button>
          <span>${w.example}</span>
          <button class="icon-btn mic" style="flex:0 0 auto" data-enc="${eEnc}" data-rid="er-${i}" onclick="startRec(this)">🎤</button>
        </div>
        <div class="ex-zh">${w.example_zh}</div>
      </div>
      ${gramBox(gram,'例句 1 ')}
      <div id="er-${i}" class="rec-result"></div>
      ${w.example2?`
      <div class="example-section" style="margin-top:10px">
        <div class="ex-label">例句 2</div>
        <div class="ex-en">
          <button class="icon-btn" style="font-size:14px;flex:0 0 auto" onclick="sayExample(${i},2)">🔊</button>
          <span>${w.example2}</span>
          <button class="icon-btn mic" style="flex:0 0 auto" data-enc="${e2Enc}" data-rid="er2-${i}" onclick="startRec(this)">🎤</button>
        </div>
        <div class="ex-zh">${w.example2_zh}</div>
      </div>
      ${gramBox(gram2,'例句 2 ')}

}

// ── 建立文法卡片 ──────────────────────────────────────────────
// ── 文法日期篩選 ──────────────────────────────────────────────
function buildGramDateBar(){
  const bar=document.getElementById("gramDateBar");
  if(!bar) return;
  const btns=[{k:"全部",l:`全部（${ALL_DATES.length}天）`},...ALL_DATES.map(d=>({k:d,l:fmtDate(d)}))];
  bar.innerHTML=btns.map(b=>
    `<button class="chip${b.k===curGramDate?" on":""}" onclick="setGramDate('${b.k}')">${b.l}</button>`
  ).join("");
}
function setGramDate(d){
  curGramDate=d;
  buildGramDateBar();
  buildGrammarCards();
}

function buildGrammarCards(){
  const feed=document.getElementById("feed");
  const todayDate=ALL_DATES[0];
  const todayG=new Set(getGrammar(todayDate).map(g=>g.title));

  // 依日期篩選
  let dates = curGramDate==="全部" ? ALL_DATES : [curGramDate];
  const seen=new Set(); const list=[];
  dates.forEach(d=>getGrammar(d).forEach(g=>{
    if(!seen.has(g.title)){seen.add(g.title);list.push({...g,_date:d});}
  }));

  if(!list.length){
    feed.innerHTML=`<div class="empty-msg">此日期無文法資料</div>`;
    return;
  }

  // 今日重點排前面（全部模式）；指定日期模式則按原順序
  const sorted = curGramDate==="全部"
    ? [...list.filter(g=>todayG.has(g.title)),...list.filter(g=>!todayG.has(g.title))]
    : list;

  // 全部模式：依日期分組顯示標題
  let html="", lastDate="";
  sorted.forEach((g,i)=>{
    if(curGramDate==="全部" && g._date!==lastDate){
      lastDate=g._date;
      const isToday=g._date===todayDate;
      html+=`<div class="date-hdr">${fmtDate(g._date)} · ${getGrammar(g._date).length} 個文法重點${isToday?' 🔵':''}</div>`;
    }
    const isToday=todayG.has(g.title)&&curGramDate==="全部";
    html+=`
    <div class="gcard">
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px">
        <span class="gcat-chip">${g.category}</span>
        ${isToday?'<span class="today-badge">今日重點</span>':''}
      </div>
      <div class="g-title">${g.title}</div>
      <div class="g-rule">${g.rule}</div>
      <div class="g-pattern-wrap">
        <div class="g-pattern-label">句型</div>
        <code class="g-pattern">${g.pattern}</code>
      </div>
      <div class="g-ex-label">例句</div>
      ${g.examples.map(ex=>`
        <div class="g-ex">
          <div class="g-ex-en">
            <button class="icon-btn" style="font-size:14px;flex:0 0 auto" onclick="sayText('${encodeURIComponent(ex.en)}','en-US')">🔊</button>
            <span>${ex.en}</span>
          </div>
          <div class="g-ex-zh">${ex.zh}</div>
        </div>`).join("")}
      <div class="g-compare">
        <div class="g-wrong">❌ 常見錯誤：${g.wrong}</div>
        <div class="g-right">✅ 正確說法：${g.right}</div>
      </div>
      <div class="g-tip">💡 ${g.tip}</div>
    </div>`;
  });
  feed.innerHTML=html;
}

// ── 卡片狀態 ──────────────────────────────────────────────────
function setActive(idx){
  document.querySelectorAll(".wcard").forEach((c,i)=>{
    c.classList.toggle("active",i===idx);
    if(i<idx)c.classList.add("done"); else c.classList.remove("done");
  });
  const c=document.getElementById("card-"+idx);
  if(c)c.scrollIntoView({behavior:"smooth",block:"center"});
  updateProgress(idx); curIdx=idx;
}
function setDot(idx,rep){
  document.querySelectorAll(`#dots-${idx} .rdot`).forEach((d,i)=>d.classList.toggle("lit",i<=rep));
}
function clearDots(idx){document.querySelectorAll(`#dots-${idx} .rdot`).forEach(d=>d.classList.remove("lit"));}
function setStatus(idx,sec,rep){
  const el=document.getElementById("status-"+idx);
  if(!el)return;
  el.classList.remove("hidden");
  el.innerHTML=`<span>${sec}</span><span>${rep?rep+"/"+REPS:""}</span>`;
}
function clearStatus(idx){const el=document.getElementById("status-"+idx);if(el)el.classList.add("hidden");}

// ── TTS ──────────────────────────────────────────────────────
function enVoice(){const vs=speechSynthesis.getVoices();return vs.find(v=>v.lang==="en-US")||vs.find(v=>/en/i.test(v.lang));}
function zhVoice(){const vs=speechSynthesis.getVoices();return vs.find(v=>/zh-TW|zh_TW/i.test(v.lang))||vs.find(v=>/zh/i.test(v.lang));}
const pause=ms=>new Promise(r=>setTimeout(r,ms));
async function sayWord(i){speechSynthesis.cancel();const w=filteredWords()[i];await speakDirect(w.word,"en-US");}
async function saySpell(i){
  speechSynthesis.cancel();
  const w=filteredWords()[i];
  for(const letter of w.word.toUpperCase()){
    await speakDirect(letter,"en-US"); await pause(220);
  }
}
async function sayExample(i,n){
  speechSynthesis.cancel();
  const w=filteredWords()[i];
  const txt = (n===2&&w.example2) ? w.example2 : w.example;
  await speakDirect(txt,"en-US");
}
function sayText(enc,lang){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(decodeURIComponent(enc));
  u.lang=lang;const v=lang.startsWith("zh")?zhVoice():enVoice();if(v)u.voice=v;
  try{speechSynthesis.resume();}catch(_){}speechSynthesis.speak(u);
}
// 播放時用（檢查 playing flag）
function speak(text,lang){
  return new Promise(res=>{
    if(!playing){res();return;}
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    const v=lang.startsWith("zh")?zhVoice():enVoice(); if(v)u.voice=v;
    u.onend=res;u.onerror=res;
    try{speechSynthesis.resume();}catch(_){}
    speechSynthesis.speak(u);
  });
}
// 直接播放用（不檢查 playing flag）
function speakDirect(text,lang){
  return new Promise(res=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    const v=lang.startsWith("zh")?zhVoice():enVoice(); if(v)u.voice=v;
    u.onend=res;u.onerror=res;
    try{speechSynthesis.resume();}catch(_){}
    speechSynthesis.speak(u);
  });
}

// ── Wake Lock（播報時保持螢幕常亮） ──────────────────────────
let wakeLock = null;
async function requestWakeLock(){
  if(!('wakeLock' in navigator)) return;
  try{
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('螢幕鎖定：已啟用（播報期間螢幕不會關閉）');
  }catch(e){ console.log('Wake lock 無法啟用:', e.message); }
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release(); wakeLock=null; }
}
// 頁面重新顯示時（切回來）若仍在播報則重新申請
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState==='visible' && playing) await requestWakeLock();
});

// ── 播放控制 ──────────────────────────────────────────────────
function updatePlayBtn(){
  const b=document.getElementById("playBtn");
  if(b) b.textContent=playing?"⏹ 停止":"▶ 播報全部";
}
function togglePlay(){if(playing)stopPlay();else startPlay();}
function startPlay(){
  if(!window.speechSynthesis){alert("此瀏覽器不支援語音功能，請使用 Chrome");return;}
  playing=true;cancelled=false;
  requestWakeLock();
  updatePlayBtn();playFrom(curIdx);
}
function stopPlay(){
  playing=false;cancelled=true;
  if(window.speechSynthesis)speechSynthesis.cancel();
  releaseWakeLock();
  clearDots(curIdx);clearStatus(curIdx);
  document.querySelectorAll(".wcard.active").forEach(c=>{c.classList.remove("active");});
  updatePlayBtn();
}
function prevWord(){stopPlay();if(curIdx>0){curIdx--;setActive(curIdx);}}
function nextWord(){stopPlay();if(curIdx<filteredWords().length-1){curIdx++;setActive(curIdx);}}
function setRate(v){rate=parseFloat(v);document.getElementById("rateLabel").textContent=v+"x";}

// 逐字母拼出單字（A-G-E-N-D-A）
async function spellWord(word){
  for(const letter of word.toUpperCase()){
    if(!playing&&letter!==word[0])return;
    await speak(letter,"en-US");
    await pause(180);
  }
}

// 播放順序：每個單字重複 3 次
// 每次：單字 → 拼字 → 英文例句1 → 中文例句1 → 英文例句2 → 中文例句2
async function playFrom(startIdx){
  const words=filteredWords();
  for(let i=startIdx;i<words.length;i++){
    if(!playing||cancelled)return;
    const w=words[i];
    setActive(i);clearDots(i);

    // ── 第一段：單字發音 → 拼音 → 中文（重複3次）──
    for(let rep=0;rep<REPS;rep++){
      if(!playing||cancelled)return;
      setDot(i,rep);
      setStatus(i,`🔤 單字`,`${rep+1}/3`);
      await speak(w.word,"en-US"); await pause(400);
      if(!playing||cancelled)return;

      setStatus(i,`🔡 拼字`,`${rep+1}/3`);
      await spellWord(w.word); await pause(300);
      if(!playing||cancelled)return;

      setStatus(i,`📝 中文`,`${rep+1}/3`);
      await speak(w.zh,"zh-TW"); await pause(450);
      if(!playing||cancelled)return;
    }

    // ── 第二段：英文例句1 → 中文例句1（重複3次）──
    if(w.example){
      for(let rep=0;rep<REPS;rep++){
        if(!playing||cancelled)return;
        setStatus(i,`📖 例句1 英`,`${rep+1}/3`);
        await speak(w.example,"en-US"); await pause(350);
        if(!playing||cancelled)return;

        setStatus(i,`📝 例句1 中`,`${rep+1}/3`);
        await speak(w.example_zh,"zh-TW"); await pause(400);
        if(!playing||cancelled)return;
      }
    }

    // ── 第三段：英文例句2 → 中文例句2（重複3次）──
    if(w.example2){
      for(let rep=0;rep<REPS;rep++){
        if(!playing||cancelled)return;
        setStatus(i,`📖 例句2 英`,`${rep+1}/3`);
        await speak(w.example2,"en-US"); await pause(350);
        if(!playing||cancelled)return;

        setStatus(i,`📝 例句2 中`,`${rep+1}/3`);
        await speak(w.example2_zh,"zh-TW"); await pause(400);
        if(!playing||cancelled)return;
      }
    }

    setStatus(i,"✅ 完成","");
    await pause(800);
  }
  if(playing)stopPlay();
}

// ── 發音辨識 ──────────────────────────────────────────────────
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function levenshtein(s,t){
  const m=s.length,n=t.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=s[i-1]===t[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function similarity(a,b){
  a=a.toLowerCase().replace(/[^a-z\s']/g,"").trim();
  b=b.toLowerCase().replace(/[^a-z\s']/g,"").trim();
  if(a===b)return 100;
  if(!a||!b)return 0;
  return Math.max(0,Math.round((1-levenshtein(a,b)/Math.max(a.length,b.length))*100));
}
function showRecResult(rid,target,heard,score){
  const el=document.getElementById(rid);if(!el)return;
  const [e,l,c]=score>=90?["🌟","非常準確","var(--green)"]:
    score>=70?["👍","不錯","var(--accent)"]:
    score>=50?["📝","有些出入","var(--orange)"]:["🔄","差異較大","var(--red)"];
  const tW=target.toLowerCase().split(/\s+/);
  const diff=heard.toLowerCase().split(/\s+/).map(w=>
    tW.includes(w)?`<span style="color:var(--green);font-weight:700">${w}</span>`:
    `<span style="color:var(--red);text-decoration:underline">${w}</span>`).join(" ");
  el.innerHTML=`<div class="rec-box">
    <div class="rec-score" style="color:${c}">${e} ${score}% ${l}</div>
    <div class="rec-row"><span class="rec-lbl">你說：</span><span>${diff}</span></div>
    <div class="rec-row"><span class="rec-lbl">目標：</span><span style="color:var(--muted)">${target}</span></div>
  </div>`;
}
function startRec(btn){
  if(!SR){alert("請用 Chrome 瀏覽器才能使用語音辨識");return;}
  const target=decodeURIComponent(btn.dataset.enc);
  const rid=btn.dataset.rid;
  const el=document.getElementById(rid);
  if(el)el.innerHTML=`<div class="rec-box rec-listening">🔴 請說：<b>${target}</b></div>`;
  btn.textContent="⏳";btn.disabled=true;
  const rec=new SR();rec.lang="en-US";rec.interimResults=false;rec.maxAlternatives=3;
  rec.onresult=(e)=>{
    showRecResult(rid,target,e.results[0][0].transcript,similarity(e.results[0][0].transcript,target));
    btn.textContent="🎤 練習";btn.disabled=false;
  };
  rec.onerror=(e)=>{
    const m={
      "no-speech":"沒偵測到聲音，請再試",
      "not-allowed":"麥克風權限被拒，請在瀏覽器設定允許",
      "network":"網路問題"
    }[e.error]||`錯誤：${e.error}`;
    if(el)el.innerHTML=`<div class="rec-box" style="color:var(--red)">⚠️ ${m}</div>`;
    btn.textContent="🎤 練習";btn.disabled=false;
  };
  rec.onend=()=>{btn.textContent="🎤 練習";btn.disabled=false;};
  try{rec.start();}catch(e){btn.textContent="🎤 練習";btn.disabled=false;}
  setTimeout(()=>{try{rec.stop();}catch(_){}},9000);
}
